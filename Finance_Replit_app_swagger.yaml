openapi: 3.0.3
info:
  title: Replit Finance App
  version: 1.0.0
servers:
  - url: https://finance-os-syedhai2002.replit.app
tags:
  - name: accounts
  - name: audit-logs
  - name: auth
  - name: bank-accounts
  - name: budgets
  - name: customers
  - name: dashboard
  - name: employees
  - name: expenses
  - name: investments
  - name: invoices
  - name: journal-entries
  - name: loans
  - name: payroll-runs
  - name: reports
  - name: tenants
  - name: users
  - name: vendor-bills
paths:
  /api/auth/token:
    post:
      tags:
        - auth
      summary: POST /api/auth/token
      operationId: post_api_auth_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPostRequest"
            examples:
              fromHar:
                value:
                  email: mohammedghouse86.backup@gmail.com
                  password: Ghouse_Tester@786
      responses:
        "200":
          description: Success
  /api/auth/register:
    post:
      tags:
        - auth
      summary: POST /api/auth/register
      operationId: post_api_auth_register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPostRequest"
            examples:
              fromHar:
                value:
                  email: mohammedghouse86.backup@gmail.com
                  password: Ghouse_Tester@786
                  name: ghouse mohammed
                  companyName: Executive G Org
      responses:
        "200":
          description: Success
  /api/dashboard/summary:
    get:
      tags:
        - dashboard
      summary: GET /api/dashboard/summary
      operationId: get_api_dashboard_summary
      responses:
        "200":
          description: Success
  /api/dashboard/revenue-chart:
    get:
      tags:
