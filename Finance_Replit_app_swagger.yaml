openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinanceOS API specification
servers:
  - url: https://finance-os-syedhai2002.replit.app/api
    description: Base API path
tags:
  - name: health
  - name: tenants
  - name: users
  - name: accounts
  - name: journal-entries
  - name: budgets
  - name: customers
  - name: invoices
  - name: expenses
  - name: vendor-bills
  - name: bank-accounts
  - name: loans
  - name: investments
  - name: employees
  - name: payroll
  - name: reports
  - name: dashboard
  - name: audit-logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── TENANTS ─────────────────────────────────────────────────────────────────
  /tenants/current:
    get:
      operationId: getCurrentTenant
      tags: [tenants]
      summary: Get current tenant
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    put:
      operationId: updateCurrentTenant
      tags: [tenants]
      summary: Update tenant settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  # ─── USERS ───────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in tenant
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: inviteUser
      tags: [users]
      summary: Invite a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserBody"
      responses:
        "201":
          description: Invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    put:
      operationId: updateUser
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: removeUser
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── CHART OF ACCOUNTS ───────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List chart of accounts
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{accountId}:
    put:
      operationId: updateAccount
      tags: [accounts]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  # ─── JOURNAL ENTRIES ─────────────────────────────────────────────────────────
  /journal-entries:
    get:
      operationId: listJournalEntries
      tags: [journal-entries]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal-entries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJournalEntryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journal-entries/{entryId}:
    get:
      operationId: getJournalEntry
      tags: [journal-entries]
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journal entry with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntryWithLines"

  /journal-entries/{entryId}/post:
    post:
      operationId: postJournalEntry
      tags: [journal-entries]
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  # ─── BUDGETS ─────────────────────────────────────────────────────────────────
  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      parameters:
        - name: fiscalYear
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
    post:
      operationId: createBudget
      tags: [budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{budgetId}:
    get:
      operationId: getBudget
      tags: [budgets]
      parameters:
        - name: budgetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetWithLines"

  /budgets/vs-actual:
    get:
      operationId: getBudgetVsActual
      tags: [budgets]
      parameters:
        - name: budgetId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget vs actual comparison
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetVsActualLine"

  # ─── CUSTOMERS ───────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
