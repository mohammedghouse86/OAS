          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    put:
      operationId: updateExpense
      tags: [expenses]
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{expenseId}/approve:
    post:
      operationId: approveExpense
      tags: [expenses]
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{expenseId}/reject:
    post:
      operationId: rejectExpense
      tags: [expenses]
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

