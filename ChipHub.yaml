components:
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token issued after login. Send as Authorization Bearer <token>. Do not send over unencrypted channels.
    ServerKeyAuth:
      type: apiKey
      in: header
      name: V-API-KEY
      description: Server-to-server or trusted-client use only (e.g. login, TOTP, admin). Must not be exposed to browsers or end users.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: User or organization API key. Also used for service callbacks (search, upload, crosspart, comparison, websearch, drivesearch) with environment-specific keys.
    MagicToken:
      type: apiKey
      in: header
      name: MAGIC-TOKEN
      description: Reserved for magic-link or one-time auth flows. Supplier RFQ access can also use X-RFQ-Session header or rfq_session HttpOnly cookie (set by POST /api/rfq/validate-key). Internal use; not for general API consumers.
  schemas:
    VersionResponse:
      type: object
      description: API version (GET /api/version).
      properties:
        version:
          type: string
    RoleInfo:
      type: object
      description: Role id and name (used in GET /api/roles response).
      properties:
        id:
          type: integer
        name:
          type: string
    RolesResponse:
      type: object
      description: Response for GET /api/roles.
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleInfo"
        count:
          type: integer
    SimpleFeature:
      type: object
      description: Feature id and key (GET /api/features).
      properties:
        id:
          type: integer
        key:
          type: string
    AuthCheckUserRequest:
      type: object
      description: Request for POST /api/auth/check-user and check-user-exists.
      properties:
        email:
          type: string
          format: email
        loginType:
          type: string
          description: Defaults to email if omitted
    CheckUserExistsResponse:
      type: object
      description: Response for POST /api/auth/check-user-exists (res 0=no user/invite, 1=user exists, 2=pending invite).
      properties:
        res:
          type: integer
          enum: [0, 1, 2]
    CreateAccountRequest:
      type: object
      description: Request for POST /api/auth/create-account-request.
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
        password:
          type: string
        orgName:
          type: string
        roleId:
          type: string
        loginType:
          type: string
    CreateAccountResponse:
      type: object
      description: Response for POST /api/auth/create-account-request (message approve or success).
      properties:
        message:
          type: string
          enum: [approve, success]
    ResendTOTPRequest:
      type: object
      description: Request for POST /api/auth/resend-totp.
      required:
        - email
      properties:
        email:
          type: string
          format: email
    TOTPGetRequest:
      type: object
      description: Request for POST /api/auth/get-totp.
      required:
        - email
      properties:
        email:
          type: string
          format: email
    TOTPGetResponse:
      type: object
      description: Response for POST /api/auth/get-totp.
      properties:
        code:
          type: string
        expires_at:
          type: string
          format: date-time
        email:
          type: string
    SoftDeleteOrgRequest:
      type: object
      description: Request body for DELETE /api/delete/org.
      required:
        - orgID
        - type
      properties:
        orgID:
          type: string
        type:
          type: string
          enum: [delete, reinstate]
    HandleInviteRequest:
      type: object
      description: Request for POST /api/groups/handle-invite.
      required:
        - email
        - type
      properties:
        email:
