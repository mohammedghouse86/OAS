  /api/docs/finalize:
    post:
      tags:
        - docs
      summary: Finalize document upload
      description: |
        Notifies the server that the document upload is complete. Accepts a single PDFProcessItem,
        an array of PDFProcessItem (batch), or a crosspart payload with documents and crosspart metadata.
        Returns only what the client needs; errors are user-facing only (no internal or PII leakage).
        The category string must match an existing row in the categories table; otherwise finalize fails
        with HTTP 500 and a FinalizeErrorResponse (e.g. unknown category message). Document visibility
        is controlled by isPublic on the payload, not by category name.
      security:
        - JWT: []
        - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PDFProcessItem"
      responses:
        "200":
          description: All documents finalized successfully (single or batch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeSuccessResponse"
        "201":
          description: Crosspart conversation created; documents finalized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeCrosspartResponse"
        "206":
          description: Partial content; one or more documents in the batch could not be finalized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeErrorResponse"
        "400":
          description: Bad request (invalid JSON, missing crosspart reference, or invalid payload).
        "401":
          description: Unauthorized
        "402":
          description: Quota exceeded
        "404":
          description: Document not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeErrorResponse"
