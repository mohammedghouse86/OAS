    CrossByIDResponse:
      type: object
      description: Minimal response containing only reference document ID and cross set entries (id and filename only) to prevent shadow data exposure. The crossSets array is bounded by server limits on total PDFs per crosspart library (not an unbounded list endpoint).
      required:
        - reference
        - crossSets
        - total
        - processed
      properties:
        reference:
          type: string
          description: The reference document ID for this crosspart comparison
        crossSets:
          type: array
          description: Non-reference PDFs in the crosspart library (id and filename only). Length is bounded by the same server limits as uploads (MAX_REF_DOCS + MAX_CROSSPART_UPLOADS_PER_REQUEST).
          items:
            $ref: "#/components/schemas/CrossSetMinimal"
        total:
          type: integer
          description: Total number of documents in the crosspart comparison
        processed:
          type: integer
          description: Number of documents processed in the crosspart comparison
