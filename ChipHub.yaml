openapi: 3.0.0
info:
  title: Chiphub Private API
  version: 1.0.10
  description: |
    API for communicating with Chiphub.

    **Security overview.** All operations enforce the security declared in this spec. Unless an operation explicitly sets `security: []`, it requires JWT (`Authorization: Bearer`) by default. Operation-level `security` overrides this default for explicit server-to-server exceptions.

    **How clients authenticate (by channel).**
    - **First-party web app (Next.js):** End users authenticate with short-lived JWTs. The browser sends `Authorization: Bearer` via the server-side proxy using HttpOnly session cookies; do not embed secrets in client bundles. The Next proxy strips `X-API-KEY` and `V-API-KEY` from browser-originated requests so sessions rely on JWT, not static keys.
    - **`X-API-KEY` (ApiKeyAuth):** Restricted to explicit backend callback/internal routes only (documented per-operation). Not valid for user/business endpoints.
    - **`V-API-KEY` (ServerKeyAuth):** **Server-only** shared key for trusted backends (e.g. Vercel server routes, internal services). Never send from browsers or include in `NEXT_PUBLIC_*` environment variables.
    - **`MAGIC-TOKEN`:** Used for supplier RFQ flows where documented; not a substitute for org user JWT for general API access.

    Static API keys are intentionally not accepted on user/business endpoints.

    **Security and transport.** Production and demo bases (https://api.chiphub.com, https://demo.api.chiphub.com) must be used over HTTPS only. Credentials and tokens must not be sent over unencrypted channels. The http://localhost:8080 server is for local development only and must not be used for production traffic or sensitive data.

    **Security and compliance.** Endpoints may process personal data (e.g. user, org, contact). Consumers must handle such data in line with applicable law (e.g. GDPR, CCPA) and the provider's terms. No payment-card data is accepted at the API layer.
x-require-https: true
x-compliance:
  personal-data: true
  note: "Consumers must handle personal data in line with applicable law (e.g. GDPR, CCPA) and the provider's terms."
servers:
  - url: https://api.chiphub.com:443
    description: Production server. HTTPS only. Do not use HTTP for this environment.
    x-require-https: true
  - url: https://demo.chiphub.com:443
    description: Demo server. HTTPS only. Do not use HTTP for this environment.
    x-require-https: true
  - url: http://localhost:8080
    description: Local development only. Must not be used for production traffic or sensitive data.
security:
  - JWT: []
paths:
  /api/ai/callback/comparison-report-callback:
    post:
      tags:
        - other
      summary: Comparison report callback (backend-only)
      security:
        - ApiKeyAuth: []
      description: Called by Python/AI service when comparison report is ready. Uses callback X-API-KEY validation; see docs/backend-only-routes.md.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Callback processed
        "500":
          description: Server error
  /api/ai/callback/crosspart-upload:
    post:
      tags:
        - other
      summary: Crosspart upload callback (backend-only)
      security:
        - ApiKeyAuth: []
      description: Called by Python when crosspart upload completes. Uses callback X-API-KEY validation; see docs/backend-only-routes.md.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Callback processed
        "500":
          description: Server error
  /api/ai/callback/search-analysis-callback:
    post:
      tags:
        - other
      summary: Search analysis callback (backend-only)
      security:
        - ApiKeyAuth: []
      description: Called by Python when search analysis completes. Uses callback X-API-KEY validation; see docs/backend-only-routes.md.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Callback processed
        "500":
          description: Server error
  /api/ai/callback/upload-doc-from-s3:
    post:
      tags:
        - other
      summary: Document upload callback (backend-only)
      security:
        - ApiKeyAuth: []
      description: Called by Python when document upload from S3 completes. Uses callback X-API-KEY validation; see docs/backend-only-routes.md.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Callback processed
        "500":
          description: Server error
  /api/auth/totp:
    post:
      tags:
        - auth
      summary: Generate a TOTP code for an email address
      x-required-role: server_only
      security:
        - ServerKeyAuth: []
      description: |
        Generates and sends a TOTP code to the specified email address. Requires server authentication (V-API-KEY). Not for end-user clients.
      requestBody:
        description: Email address to send the TOTP code to.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTOTPReq"
      responses:
        "200":
          description: Email Sent
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/auth/invite:
    post:
      tags:
        - auth
      summary: Invite a user
      x-personal-data: true
      x-required-role: org_admin
      security:
        - JWT: []
      description: |
        Allows an admin to invite a user to the platform. Intended for organization or system administrators.
      requestBody:
        description: User invitation details.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInviteReq"
      responses:
        "200":
          description: User invited
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden – authenticated but not allowed to perform this action (e.g. insufficient role).
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/orgs:
    get:
      tags:
        - orgs
      summary: List organizations
      x-personal-data: true
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Retrieves a paginated list of organizations. Results are always bounded (default limit 50, max 100).
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of organizations to return (default 50, max 100)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Number of organizations to skip (for pagination)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: col
          in: query
          required: false
          description: Column to filter by when using searchString
          schema:
            type: string
        - name: searchString
          in: query
          required: false
          description: Search term to filter organizations
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgsListResponse"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
    post:
      tags:
        - orgs
      summary: Create an organization
      x-personal-data: true
      x-required-role: super_admin
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Allows a super admin to create a new organization.
      requestBody:
        description: Organization creation details.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgCreationReq"
      responses:
        "200":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgCreationResp"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
    delete:
      tags:
        - orgs
      summary: Delete organizations by IDs
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Deletes one or more organizations. Expects comma-separated organization IDs in query parameter. Restricted to super admin or org admin (org admin can only delete their own org). Optional force=true to delete even if orgs have users.
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated list of organization IDs to delete
          schema:
            type: string
        - name: force
          in: query
          required: false
          description: If true, delete organizations even if they have users
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Organizations deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: No IDs provided or invalid format
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: Unauthorized
        "403":
          description: Forbidden – not super admin or org admin; or org admin trying to delete multiple orgs
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Conflict – organizations have users and force not set
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/orgs/{orgID}/features:
    post:
      tags:
        - orgs
      summary: Set organization features
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Allows a super admin to set features for an organization.
      parameters:
        - name: orgID
          in: path
          required: true
          description: The ID of the organization.
          schema:
            type: string
      requestBody:
        description: Features to set for the organization.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureSet"
      responses:
        "200":
          description: Features set
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
    get:
      tags:
        - orgs
      summary: Get organization features
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Retrieves the features set for an organization.
      parameters:
        - name: orgID
          in: path
          required: true
          description: The ID of the organization.
          schema:
            type: string
      responses:
        "200":
          description: Organization features
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureSet"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
  /api/orgs/{orgID}/feats:
    get:
      tags:
        - orgs
      summary: Get organization feats
      x-personal-data: true
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Retrieves feats (feature flags) for an organization.
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization feats
        "401":
          description: Unauthorized
        "403":
          description: Forbidden – authenticated but not allowed to perform this action.
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
    patch:
      tags:
        - orgs
      summary: Update organization feats
      x-personal-data: true
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Updates feats (feature flags) for an organization.
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Feats updated
        "401":
          description: Unauthorized
        "403":
          description: Forbidden – authenticated but not allowed to perform this action.
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/orgs/{orgID}/buyer-parts:
    get:
      tags:
        - orgs
      summary: Get buyer parts by organization
      x-personal-data: true
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Retrieves buyer parts associated with an organization.
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Buyer parts list
        "401":
          description: Unauthorized
        "403":
          description: Forbidden – authenticated but not allowed to perform this action.
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/orgs/byid/{orgID}:
    get:
      tags:
        - orgs
      summary: Get organization by ID
      x-personal-data: true
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Retrieves full details of an organization by its ID, including quotas and usage.
      parameters:
        - name: orgID
          in: path
          required: true
          description: The ID of the organization.
          schema:
            type: string
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputedOrgResp"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
    patch:
      tags:
        - orgs
      summary: Update organization by ID
      security:
        - JWT: []
        - ApiKeyAuth: []
      description: Updates organization metadata (such as name, domain, and partner status) by its ID. Returns only an HTTP status on success (no response body).
      parameters:
        - name: orgID
          in: path
          required: true
          description: The ID of the organization.
          schema:
            type: string
      requestBody:
        description: Organization update details.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputedOrgResp"
      responses:
        "200":
          description: Organization updated successfully (no response body)
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
  /api/orgs/{orgID}/usage:
    get:
      tags:
        - orgs
      summary: Get organization usage
      description: Returns usage information for the specified organization (orgID, usage array).
      x-personal-data: true
      security:
        - JWT: []
        - ApiKeyAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          description: The ID of the organization
          schema:
            type: string
      responses:
        "200":
          description: Organization usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUsageResponse"
        "400":
          description: Invalid input (orgID missing)
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not user's org)
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/orgs/{orgID}/customer-portal:
    post:
      tags:
        - orgs
      summary: Create customer portal session
      description: Creates a Stripe customer portal session for the organization (billing management). Returns portal_url, session_id, customer_id, organization_id, note.
      x-personal-data: true
      security:
        - JWT: []
      parameters:
        - name: orgID
          in: path
          required: true
          description: The ID of the organization
          schema:
            type: string
      responses:
        "200":
          description: Customer portal session (portal_url, session_id, customer_id, organization_id, note)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPortalSessionResponse"
        "400":
          description: Bad request (orgID missing, no Stripe customer ID)
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not user's org)
        "404":
          description: No subscription found for this organization
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/orgs/get-attributes-for-type/{type}:
    get:
      tags:
        - orgs
      summary: Get attributes for type
      description: Returns attribute definitions for a given type (e.g. buyer parts).
      security:
        - JWT: []
      parameters:
        - name: type
          in: path
          required: true
          description: The attribute type
          schema:
            type: string
      responses:
        "200":
          description: Attributes for the type
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/auth/reset:
    post:
      tags:
        - auth
      summary: Reset user password
      x-personal-data: true
      security: []
      description: |
        Allows a user to reset their password. No authentication is required; this operation is intentionally public.
      requestBody:
        description: Password reset request details.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAuthReq"
      responses:
        "200":
          description: Password reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResetResp"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
  /api/auth/signup:
    post:
      deprecated: true
      tags:
        - auth
      summary: Sign up a new user (DEPRECATED – use TOTP flow /api/auth/create-account-request)
      x-personal-data: true
      security: []
      description: |
        DEPRECATED. Route removed from backend; replaced by TOTP flow (CreateNewAccountRequestWithOTP).
        Allows a user to create a new account. No authentication is required; this operation is intentionally public.
      requestBody:
        description: User sign-up details.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAuthReq"
      responses:
        "200":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResp"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
  /api/auth/head:
    head:
      tags:
        - auth
      summary: Check authentication status
      security:
        - JWT: []
      description: Checks if the user is authenticated.
      responses:
        "200":
          description: Authenticated
        "401":
          description: Relogin required
  /api/auth/login:
    post:
      tags:
        - auth
      summary: Log in a user
      x-personal-data: true
      x-required-role: server_only
      security:
        - ServerKeyAuth: []
      description: |
        Validates user credentials and generates a JWT. Requires server authentication (V-API-KEY). Not for end-user clients.
      requestBody:
        description: User login details.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAuthReq"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResp"
        "400":
          description: Invalid input
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "401":
          description: Unauthorized
  /api/auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh JWT using refresh token
      security: []
      description: |
        Issues a new JWT using a valid refresh token (e.g. from cookie). No authentication header required; this operation is intentionally public for the refresh flow.
      responses:
        "200":
          description: New tokens issued
        "400":
          description: Invalid input
        "401":
          description: Unauthorized or invalid refresh token
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/auth/logout:
    post:
      tags:
        - auth
      summary: Log out the current session
      security:
        - JWT: []
      description: Logs out the authenticated user. Requires valid JWT or session.
      responses:
        "200":
          description: Logged out successfully
        "401":
          description: Unauthorized
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/auth/revokeToken:
    post:
      tags:
        - auth
      summary: Revoke the current access token
      security:
        - JWT: []
      description: |
        Invalidates the JWT sent in the Authorization header by adding it to the blacklist.
        Does not clear cookies or revoke refresh tokens; use POST /api/auth/logout for full logout.
        Use this endpoint for explicit token invalidation (e.g. from another client or tool).
      responses:
        "200":
          description: Token revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Token revoked"
        "401":
          description: Unauthorized or invalid token format
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
  /api/auth/check-user:
    post:
      tags:
        - auth
      summary: Check user and send OTP if new
      description: If user exists returns 409; if pending invite 409; otherwise sends OTP and returns 200.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCheckUserRequest"
      responses:
        "200":
          description: OTP sent (new user)
        "400":
          description: Invalid request or user deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: User already exists or pending invite
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  login_type:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/auth/check-user-exists:
    post:
      tags:
        - auth
      summary: Check if user or invite exists
      description: Returns res 1 if user exists, 2 if pending invite, 0 otherwise.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCheckUserRequest"
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckUserExistsResponse"
        "400":
          description: Invalid request or user deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/auth/create-account-request:
    post:
      tags:
        - auth
      summary: Create account with OTP (TOTP flow)
      description: Validates OTP and creates account; for existing org returns message approve, for new org creates account and returns message success.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: Success or approval required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountResponse"
        "409":
          description: Invalid OTP, duplicate, or validation error
        "500":
          description: Server error
  /api/auth/get-totp:
    post:
      tags:
        - auth
      summary: Get TOTP by email (backend/admin)
      x-required-role: server_only
      security:
        - JWT: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPGetRequest"
      responses:
        "200":
          description: TOTP code and expiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TOTPGetResponse"
        "400":
