  /api/rfq/validate-key:
    post:
      tags:
        - rfq
      security: []
      summary: Validate RFQ access key
      description: Unauthenticated. Validates magic-link token plus 16-char access key; on success sets HttpOnly cookie (rfq_session) and returns redirect URL. Rate limit 30/min per IP. 423 when locked (too many wrong attempts); Retry-After header set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRFQKeyRequest"
      responses:
        "200":
          description: Key valid; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateRFQKeyResponse"
        "400":
          description: Bad request (missing token or accessKey)
        "401":
          description: Invalid token or wrong access key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateRFQKeyError"
        "423":
          description: Locked (too many wrong attempts). Retry-After header set.
        "429":
          description: Too many requests. Retry-After header set.
        "500":
          description: Internal server error
