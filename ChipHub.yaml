        "404":
          description: Documents not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
        "200":
          description: Document processing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PDFIDs"
