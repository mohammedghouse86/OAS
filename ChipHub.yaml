  /api/rfq/metadata/list:
    get:
      tags:
        - rfq
      security:
        - JWT: []
        - ApiKeyAuth: []
      summary: Get RFQ metadata list
      description: >-
        Retrieve RFQ metadata (id, name, totalParts, deadline, type) for the authenticated user.
        Filter by one or more RFQ types via repeated `type` query params (e.g. type=long&type=custom)
        or comma-separated values in a single param (e.g. type=long,custom). Omit `type` to return all types.
      parameters:
        - name: type
          in: query
          required: false
          description: RFQ type filter; repeat or use comma-separated values. Invalid values return 400.
          schema:
            type: array
            items:
              type: string
              enum: [long, short, sample, custom]
          style: form
          explode: true
        - name: startDate
          in: query
          required: false
          description: Inclusive lower bound on rfq.updated_at (YYYY-MM-DD).
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          description: Inclusive upper bound on rfq.updated_at date (YYYY-MM-DD).
          schema:
            type: string
            format: date
      responses:
        "200":
          description: RFQ metadata list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RFQMetadataListItem"
        "400":
          description: Bad request (e.g. invalid type or date range)
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
