  /api/search/web/{request_id}:
    get:
      tags:
        - WebSearch
      summary: Get web search job status
      description: Returns the current status and a single page of results for a web search job by request ID. Creator only. Results are paginated; use query parameters page and page_size (max 25 per response).
      security:
        - JWT: []
        - ApiKeyAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          description: The web search job request ID
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 1-based page index (default 1).
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Number of results per page (default 10). Allowed values are 5, 10, or 25.
          schema:
            type: integer
            enum: [5, 10, 25]
            default: 10
      responses:
        "200":
          description: Web search job status and results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSearchJobStatus"
        "400":
          description: Invalid request_id, page, or page_size
        "401":
          description: Unauthorized
        "404":
          description: Job not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
