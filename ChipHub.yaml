      description: Returns a presigned URL and UUID for uploading a document. Requires MAGIC-TOKEN or session auth. Optional headers OBJECT-KEY, OBJECT-ID, DOCUMENT-TYPE.
      security:
        - JWT: []
        - ApiKeyAuth: []
        - MagicToken: []
