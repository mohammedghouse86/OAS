            type: string
        - name: startDate
          in: query
          description: Filter RFQs by start date (YYYY-MM-DD format)
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter RFQs by end date (ISO 8601 datetime format)
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Page size (default 50, max 500). Capped for DoS mitigation.
          schema:
            type: integer
