  /api/conversations/{conversationID}/documents:
    post:
      tags:
        - conversations
      summary: Add documents to a collection
      description: |
        Adds one or more documents to an existing conversation collection. Documents may be either new uploads
        (upload to S3 via presigned URL first, then pass the UUID here) or existing library documents (pass
        pdfID with existingLibraryDocument true; they are linked to the collection without re-processing or
        quota). Only new uploads consume document quota. For new uploads, only documents that succeed in RAG
        processing are added; partial success is possible. The conversation is set inactive until all newly
        added documents finish RAG processing; the callback reactivates it. When only existing library docs
        are added, the conversation is reactivated immediately. If zero documents are successfully added, the
        conversation is removed.
      security:
        - JWT: []
        - ApiKeyAuth: []
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
          description: The conversation (collection) ID to add documents to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - documents
              properties:
                documents:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - pdfID
                    properties:
                      pdfID:
                        type: string
                        description: UUID of the document (from presigned upload or existing library doc)
                      title:
                        type: string
                        description: Optional display title
                      category:
                        type: string
                        description: Optional category (default datasheet)
                      existingLibraryDocument:
                        type: boolean
                        description: When true, the document is already in the user's library; only link to the collection (no upload/finalize, no quota). Default false.
      responses:
        "200":
          description: Request completed. pdfIDs contains documents that were successfully added; partial success is possible.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pdfIDs:
                    type: array
                    items:
                      type: string
                    description: UUIDs of documents that were successfully processed (RAG) and added to the collection; subset of request if some failed.
        "400":
          description: |
            Bad request (no documents, invalid body, not a collection), or the request would exceed the
            server-configured maximum documents per collection (MAX_DOCS_PER_COLLECTION, default 10).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: Unauthorized
        "403":
          description: Access denied to conversation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
