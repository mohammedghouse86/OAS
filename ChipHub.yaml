        Idempotent; no-op if the user has already accepted or was not invited.
      security:
        - JWT: []
      parameters:
        - name: conversationID
          in: path
          required: true
          description: ID of the conversation
          schema:
            type: string
      responses:
        "200":
          description: Invite accepted (or already accepted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  targetURL:
                    type: string
                    example: "/chat/cnv-xxx"
        "400":
          description: Missing conversation ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden – user cannot access this conversation
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/500Error"
