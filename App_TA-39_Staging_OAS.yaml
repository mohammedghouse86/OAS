components:
  schemas:
    RubricsPutRequest:
      type: object
      properties:
        RubricTitle:
          type: string
        RubricDetails:
          type: string
        Analysis:
          type: object
          properties:
            metadata:
              type: object
              properties:
                title:
                  nullable: true
                grade_level:
                  nullable: true
                subject:
                  nullable: true
                standards:
                  nullable: true
              required:
                - title
                - grade_level
                - subject
                - standards
            general_info:
              type: array
              items:
                type: string
            criteria:
              type: array
              items:
                type: object
                properties:
                  original_text:
                    type: string
                  criterion_id:
                    type: string
                  criterion_name:
                    type: string
                  weight:
                    nullable: true
                  scale:
                    type: object
                    properties:
                      type:
                        type: string
                      levels:
                        type: array
                        items:
                          type: object
                          properties:
                            label:
                              type: string
                            original_text:
                              type: string
                          required:
                            - label
                            - original_text
                      min:
                        nullable: true
                      max:
                        nullable: true
                    required:
                      - type
                      - levels
                      - min
                      - max
                required:
                  - original_text
                  - criterion_id
                  - criterion_name
                  - weight
                  - scale
            total_score:
              nullable: true
            score_bands:
              nullable: true
            reasoning:
              type: string
            usage:
              type: object
              properties:
                completion_tokens:
                  type: integer
                prompt_tokens:
                  type: integer
                total_tokens:
                  type: integer
                completion_tokens_details:
                  type: object
                  properties:
                    accepted_prediction_tokens:
                      type: integer
                    audio_tokens:
                      type: integer
                    reasoning_tokens:
                      type: integer
                    rejected_prediction_tokens:
                      type: integer
                  required:
                    - accepted_prediction_tokens
                    - audio_tokens
                    - reasoning_tokens
                    - rejected_prediction_tokens
                prompt_tokens_details:
                  type: object
                  properties:
                    audio_tokens:
                      type: integer
                    cached_tokens:
                      type: integer
                  required:
                    - audio_tokens
                    - cached_tokens
              required:
                - completion_tokens
                - prompt_tokens
                - total_tokens
                - completion_tokens_details
                - prompt_tokens_details
            provider:
              type: string
            model:
              type: string
            version:
              type: string
            date_extracted:
              type: string
          required:
            - metadata
            - general_info
            - criteria
            - total_score
            - score_bands
            - reasoning
            - usage
            - provider
            - model
            - version
            - date_extracted
      required:
        - RubricTitle
        - RubricDetails
        - Analysis
    RubricsPostRequest:
      type: object
      properties:
        RubricID:
          type: integer
        RubricTitle:
          type: string
        RubricDetails:
          type: string
        DateCreated:
          type: string
      required:
        - RubricID
        - RubricTitle
        - RubricDetails
        - DateCreated
    "{id}PutRequest":
      type: object
      properties:
        FeedbackTemplateTitle:
          type: string
        FeedbackTemplateDetails:
          type: string
      required:
        - FeedbackTemplateTitle
        - FeedbackTemplateDetails
    "{id}PostRequest":
      type: object
      properties:
        FeedbackTemplateID:
          type: integer
        FeedbackTemplateTitle:
          type: string
        FeedbackTemplateDetails:
          type: string
        DateCreated:
          type: string
      required:
        - FeedbackTemplateID
        - FeedbackTemplateTitle
        - FeedbackTemplateDetails
        - DateCreated
    AssignmentsPostRequest:
      type: object
      properties:
        DateCreated:
          type: string
        DueDate:
          type: string
        Grade:
          type: string
        Name:
          type: string
        Status:
          type: string
        Subject:
          type: string
        Course:
          type: string
        Submissions:
          type: string
        TeachersName:
          type: string
        RubricID:
          type: integer
        FeedbackTemplateID:
          type: integer
        QuestionSet:
          type: array
          items:
            type: object
            properties:
              details:
                type: string
              criteria:
                type: string
            required:
              - details
              - criteria
        QuizID:
          type: integer
        CreatedBy:
          type: integer
        trialRun:
          type: boolean
        lastPublished:
          nullable: true
        isCopilotEnabled:
          type: boolean
        FolderID:
          type: integer
      required:
        - DateCreated
        - DueDate
        - Grade
        - Name
        - Status
        - Subject
        - Course
        - Submissions
        - TeachersName
        - RubricID
        - FeedbackTemplateID
        - QuestionSet
        - QuizID
        - CreatedBy
        - trialRun
        - lastPublished
        - isCopilotEnabled
        - FolderID
    AssignmentsPutRequest:
      type: object
      properties: {}
      required: []
