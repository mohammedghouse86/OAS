            examples:
              fromHar:
                value:
                  RubricTitle: "Sample Rubric "
                  RubricDetails: >
                    With your timeline/brainstorm, you started to reflect on your literacy experiences, and you will use
                    that to create a literacy autobiography, a reflective account sharing your most defining experiences
                    as a reader and writer. 


                    Imagine you're telling a genuinely curious audience about your history with writing.  (That would be
                    me.)  I know nothing about you. I'm curious to learn about what you've written, your feelings about
                    stories and composition, and your hopes for the future. I'm curious about where you started, where
                    you're headed, and how you feel about it.


                    Begin by selecting three moments from your timeline and describe each one in its own thoughtful
                    paragraph. You can share what these experiences reveal about you, how they shaped you, or how you've
                    chanved. The main idea is up to you. Remember, this is your personal story, so it's essential to be
                    genuine and in your reflections and bring it to life for your reader. This is an opportunity for you
                    explore your experiences with communication, language, and personal growth. Share how these moments
                    shaped you. 

                     

                     When you finish, please submit at least three paragraphs.

                    -respond to the prompt and provide a clear main idea


                    - provide and explain specific examples


                    - use complete sentences and correct punctuation and spelling


                    - use transition words and phrases


                    - offer a conclusion
                  Analysis:
                    metadata:
                      title: null
                      grade_level: null
                      subject: null
                      standards: null
                    general_info:
                      - >-
                        With your timeline/brainstorm, you started to reflect on your literacy experiences, and you will
                        use that to create a literacy autobiography, a reflective account sharing your most defining
                        experiences as a reader and writer. 


                        Imagine you're telling a genuinely curious audience about your history with writing.  (That
                        would be me.)  I know nothing about you. I'm curious to learn about what you've written, your
                        feelings about stories and composition, and your hopes for the future. I'm curious about where
                        you started, where you're headed, and how you feel about it.


                        Begin by selecting three moments from your timeline and describe each one in its own thoughtful
                        paragraph. You can share what these experiences reveal about you, how they shaped you, or how
                        you've chanved. The main idea is up to you. Remember, this is your personal story, so it's
                        essential to be genuine and in your reflections and bring it to life for your reader. This is an
                        opportunity for you explore your experiences with communication, language, and personal growth.
                        Share how these moments shaped you. 
                         
                         
                         When you finish, please submit at least three paragraphs.
                    criteria:
                      - original_text: -respond to the prompt and provide a clear main idea
                        criterion_id: CR1
                        criterion_name: -respond to the prompt and provide a clear main idea
                        weight: null
                        scale:
                          type: qualitative
                          levels:
                            - label: -respond to the prompt and provide a clear main idea
                              original_text: -respond to the prompt and provide a clear main idea
                          min: null
                          max: null
                      - original_text: "- provide and explain specific examples"
                        criterion_id: CR2
                        criterion_name: "- provide and explain specific examples"
                        weight: null
                        scale:
                          type: qualitative
                          levels:
                            - label: "- provide and explain specific examples"
                              original_text: "- provide and explain specific examples"
                          min: null
                          max: null
                      - original_text: "- use complete sentences and correct punctuation and spelling"
                        criterion_id: CR3
                        criterion_name: "- use complete sentences and correct punctuation and spelling"
                        weight: null
                        scale:
                          type: qualitative
                          levels:
                            - label: "- use complete sentences and correct punctuation and spelling"
                              original_text: "- use complete sentences and correct punctuation and spelling"
                          min: null
                          max: null
                      - original_text: "- use transition words and phrases"
                        criterion_id: CR4
                        criterion_name: "- use transition words and phrases"
                        weight: null
                        scale:
                          type: qualitative
                          levels:
                            - label: "- use transition words and phrases"
                              original_text: "- use transition words and phrases"
                          min: null
                          max: null
                      - original_text: "- offer a conclusion"
                        criterion_id: CR5
                        criterion_name: "- offer a conclusion"
                        weight: null
                        scale:
                          type: qualitative
                          levels:
                            - label: "- offer a conclusion"
                              original_text: "- offer a conclusion"
                          min: null
                          max: null
                    total_score: null
                    score_bands: null
                    reasoning: Rubric provides five bullet-point requirements with no performance levels or numeric scores; each bullet
                      treated as its own qualitative criterion with a single level.
                    usage:
                      completion_tokens: 4413
                      prompt_tokens: 4068
                      total_tokens: 8481
                      completion_tokens_details:
                        accepted_prediction_tokens: 0
                        audio_tokens: 0
                        reasoning_tokens: 3520
                        rejected_prediction_tokens: 0
                      prompt_tokens_details:
                        audio_tokens: 0
                        cached_tokens: 0
                    provider: openai
                    model: o3-2025-04-16
                    version: "2"
                    date_extracted: 2026-02-25T01:31:59.797422Z
      responses:
        "200":
          description: Success
