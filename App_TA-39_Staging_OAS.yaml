openapi: 3.0.3
info:
  title: Ta-39 Staging App
  version: 1.0.0
servers:
- url: https://api-staging.ta-39.com
tags:
- name: assignments
- name: chat
- name: classroom
- name: folders
- name: login
- name: rubrics
- name: submissions
- name: users
- name: '{id}'
- name: exemplar_analysis_history
paths:
  /login/application:
    post:
      tags:
      - login
      summary: POST /login/application
      operationId: post_login_application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPostRequest'
            examples:
              fromHar:
                value:
                  email: example@mail.org
                  password: P@$$\/\/0r|)
      responses:
        '200':
          description: Success
  /users/:
    get:
      tags:
      - users
      summary: GET /users/
      operationId: get_users
      responses:
        '200':
          description: Success
  /folders/with-assignment-count:
    get:
      tags:
      - folders
      summary: GET /folders/with-assignment-count
      operationId: get_folders_id
      responses:
        '200':
          description: Success
  /assignments/:
    get:
      tags:
      - assignments
      summary: GET /assignments/
      operationId: get_assignments
      responses:
        '200':
          description: Success
    post:
      tags:
      - assignments
      summary: POST /assignments/
      operationId: post_assignments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentsPostRequest'
            examples:
              fromHar:
                value:
                  DateCreated: 2026-03-03 00:15:48.636000+00:00
                  DueDate: 2026-03-02 18:30:00+00:00
                  Grade: 2nd
                  Name: a
                  Status: Open
                  Subject: a
                  Course: aa
                  Submissions: ''
                  TeachersName: ''
                  RubricID: 2321
                  FeedbackTemplateID: 1210
                  QuestionSet:
                  - details: a
                    criteria: a
                  QuizID: 0
                  CreatedBy: 0
                  trialRun: false
                  lastPublished: null
                  isCopilotEnabled: true
                  FolderID: 1582
      responses:
        '200':
          description: Success
  /rubrics/:
    get:
      tags:
      - rubrics
      summary: GET /rubrics/
      operationId: get_rubrics
      responses:
        '200':
          description: Success
    post:
      tags:
      - rubrics
      summary: POST /rubrics/
      operationId: post_rubrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RubricsPostRequest'
            examples:
              fromHar:
                value:
                  RubricID: 0
                  RubricTitle: t
                  RubricDetails: t
                  DateCreated: 2026-03-03 00:14:33.037000+00:00
      responses:
        '200':
          description: Success
  /assignments/folder/1581:
    get:
      tags:
      - assignments
      summary: GET /assignments/folder/1581
      operationId: get_assignments_folder_id
      responses:
        '200':
          description: Success
  /folders:
    get:
      tags:
      - folders
      summary: GET /folders
      operationId: get_folders
      responses:
        '200':
          description: Success
  /assignments/1040/move/1588:
    put:
      tags:
      - assignments
      summary: PUT /assignments/1040/move/1588
      operationId: put_assignments_id_move_id2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentsPutRequest'
            examples:
              fromHar:
                value: {}
      responses:
        '200':
          description: Success
  /rubrics/190:
    put:
      tags:
      - rubrics
      summary: PUT /rubrics/190
      operationId: put_rubrics_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RubricsPutRequest'
            examples:
              fromHar:
                value:
                  RubricTitle: Grading Rubric for History Essay 1
                  RubricDetails: Rubric Details for Assignment 1
                  Analysis:
                    metadata:
                      title: Rubric Details for Assignment 1
                      grade_level: null
                      subject: null
                      standards: null
                    general_info: []
                    criteria: []
                    total_score: null
                    score_bands: null
                    reasoning: Only a title present; no criteria or scoring information
                      in the provided text.
                    usage:
                      completion_tokens: 811
                      prompt_tokens: 3813
                      total_tokens: 4624
                      completion_tokens_details:
                        accepted_prediction_tokens: 0
                        audio_tokens: 0
                        reasoning_tokens: 704
                        rejected_prediction_tokens: 0
                      prompt_tokens_details:
                        audio_tokens: 0
                        cached_tokens: 0
                    provider: openai
                    model: o3-2025-04-16
                    version: '2'
                    date_extracted: 2026-03-02 05:46:34.296492+00:00
      responses:
        '200':
          description: Success
  /feedback_templates/:
    get:
      tags:
      - '{id}'
      summary: GET /feedback_templates/
      operationId: get_id
      responses:
        '200':
          description: Success
    post:
      tags:
      - '{id}'
      summary: POST /feedback_templates/
      operationId: post_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/{id}PostRequest'
            examples:
              fromHar:
                value:
                  FeedbackTemplateID: 0
                  FeedbackTemplateTitle: a
                  FeedbackTemplateDetails: a
                  DateCreated: 2026-03-03 00:15:37.835000+00:00
      responses:
        '200':
          description: Success
  /assignments/9929:
    get:
      tags:
      - assignments
      summary: GET /assignments/9929
      operationId: get_assignments_id
      responses:
        '200':
          description: Success
  /assignments/9929/report/performance:
    get:
      tags:
      - assignments
      summary: GET /assignments/9929/report/performance
      operationId: get_assignments_id_report_performance
      responses:
        '200':
          description: Success
  /rubrics/quiz/9929/exemplars:
    get:
      tags:
      - rubrics
      summary: GET /rubrics/quiz/9929/exemplars
      operationId: get_rubrics_quiz_id_exemplars
      responses:
        '200':
          description: Success
  /assignments/feedback-view-style/9929:
    get:
      tags:
      - assignments
      summary: GET /assignments/feedback-view-style/9929
      operationId: get_assignments_id_id2
      responses:
        '200':
          description: Success
  /analysis_history/credits_used:
    get:
      tags:
      - '{id}'
      summary: GET /analysis_history/credits_used
      operationId: get_id_credits_used
      responses:
        '200':
          description: Success
  /classroom/9929:
    get:
      tags:
      - classroom
      summary: GET /classroom/9929
      operationId: get_classroom_id
      responses:
        '200':
          description: Success
  /rubrics/2321:
    get:
      tags:
      - rubrics
      summary: GET /rubrics/2321
      operationId: get_rubrics_id
      responses:
        '200':
          description: Success
  /feedback_templates/1210:
    get:
      tags:
      - '{id}'
      summary: GET /feedback_templates/1210
      operationId: get_id_id2
      responses:
        '200':
          description: Success
  /chat/assignment/9929/user/16/thread:
    get:
      tags:
      - chat
      summary: GET /chat/assignment/9929/user/16/thread
      operationId: get_chat_assignment_id_user_id2_thread
      parameters:
      - name: role
        in: query
        required: false
        schema:
          type: string
        example: teacher
      - name: studentId
        in: query
        required: false
        schema:
          type: string
        example: undefined
      responses:
        '200':
          description: Success
  /submissions/16/quiz/9929:
    get:
      tags:
      - submissions
      summary: GET /submissions/16/quiz/9929
      operationId: get_submissions_id_quiz_id2
      responses:
        '200':
          description: Success
    post:
      tags:
      - submissions
      summary: POST /submissions/16/quiz/9929
      operationId: post_submissions_id_quiz_id2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionsPostRequest'
            examples:
              fromHar:
                value:
                  Analysis: ''
                  Status: Open
                  SubmissionID: 0
                  AssignmentID: 9929
                  Collaborators: ''
                  SubmissionFiles:
                  - AssignmentID: 9929
                    StudentID: '33'
                    Data: filename:sample.pdf,data:application/pdf;base64,
                  files:
                  - fileName: sample.pdf
                    fileSize: 0 bytes
                    icon:
                      type:
                        displayName: Image
                      key: null
                      ref: null
                      props: {}
                      _owner: null
                  StudentID: '33'
                  StudentName: cf
                  DateCreated: 2026-03-03 00:16:22.424000+00:00
      responses:
        '200':
          description: Success
  /classroom/:
    get:
      tags:
      - classroom
      summary: GET /classroom/
      operationId: get_classroom
      responses:
        '200':
          description: Success
  /assignments/folder/{folderId}:
    get:
      tags:
      - assignments
      summary: GET /assignments/folder/{folderId}
      operationId: get_assignments_folder_folderId
      parameters:
      - name: folderId
        in: path
        required: true
        schema:
          type: string
        example: '1581'
      responses:
        '200':
          description: Success
  /exemplar_analysis_history/{assignmentId}/{userId}:
    get:
      tags:
      - exemplar_analysis_history
      summary: GET /exemplar_analysis_history/{assignmentId}/{userId}
      operationId: get_exemplar_analysis_history_assignmentId_userId
      parameters:
      - name: assignmentId
        in: path
        required: true
        schema:
          type: string
        example: '170'
      - name: userId
        in: path
        required: true
        schema:
          type: string
        example: '16'
      responses:
        '200':
          description: Success
  /exemplar_analysis_history/{assignmentId}:
    get:
      tags:
      - exemplar_analysis_history
      summary: GET /exemplar_analysis_history/{assignmentId}
      operationId: get_exemplar_analysis_history_assignmentId
      parameters:
      - name: assignmentId
        in: path
        required: true
        schema:
          type: string
        example: '170'
      responses:
        '200':
          description: Success
components:
  schemas:
    LoginPostRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
      - email
      - password
    AssignmentsPutRequest:
      type: object
      properties: {}
      required: []
    RubricsPutRequest:
      type: object
      properties:
        RubricTitle:
          type: string
        RubricDetails:
          type: string
        Analysis:
          type: object
          properties:
            metadata:
              type: object
              properties:
                title:
                  type: string
                grade_level:
                  nullable: true
                subject:
                  nullable: true
                standards:
                  nullable: true
              required:
              - title
              - grade_level
              - subject
              - standards
            general_info:
              type: array
              items:
                type: string
            criteria:
              type: array
              items:
                type: string
            total_score:
              nullable: true
            score_bands:
              nullable: true
            reasoning:
              type: string
            usage:
              type: object
              properties:
                completion_tokens:
                  type: integer
                prompt_tokens:
                  type: integer
                total_tokens:
                  type: integer
                completion_tokens_details:
                  type: object
                  properties:
                    accepted_prediction_tokens:
                      type: integer
                    audio_tokens:
                      type: integer
                    reasoning_tokens:
                      type: integer
                    rejected_prediction_tokens:
                      type: integer
                  required:
                  - accepted_prediction_tokens
                  - audio_tokens
                  - reasoning_tokens
                  - rejected_prediction_tokens
                prompt_tokens_details:
                  type: object
                  properties:
                    audio_tokens:
                      type: integer
                    cached_tokens:
                      type: integer
                  required:
                  - audio_tokens
                  - cached_tokens
              required:
              - completion_tokens
              - prompt_tokens
              - total_tokens
              - completion_tokens_details
              - prompt_tokens_details
            provider:
              type: string
            model:
              type: string
            version:
              type: string
            date_extracted:
              type: string
          required:
          - metadata
          - general_info
          - criteria
          - total_score
          - score_bands
          - reasoning
          - usage
          - provider
          - model
          - version
          - date_extracted
      required:
      - RubricTitle
      - RubricDetails
      - Analysis
    RubricsPostRequest:
      type: object
      properties:
        RubricID:
          type: integer
        RubricTitle:
          type: string
        RubricDetails:
          type: string
        DateCreated:
          type: string
      required:
      - RubricID
      - RubricTitle
      - RubricDetails
      - DateCreated
    '{id}PostRequest':
      type: object
      properties:
        FeedbackTemplateID:
          type: integer
        FeedbackTemplateTitle:
          type: string
        FeedbackTemplateDetails:
          type: string
        DateCreated:
          type: string
      required:
      - FeedbackTemplateID
      - FeedbackTemplateTitle
      - FeedbackTemplateDetails
      - DateCreated
    AssignmentsPostRequest:
      type: object
      properties:
        DateCreated:
          type: string
        DueDate:
          type: string
        Grade:
          type: string
        Name:
          type: string
        Status:
          type: string
        Subject:
          type: string
        Course:
          type: string
        Submissions:
          type: string
        TeachersName:
          type: string
        RubricID:
          type: integer
        FeedbackTemplateID:
          type: integer
        QuestionSet:
          type: array
          items:
            type: object
            properties:
              details:
                type: string
              criteria:
                type: string
            required:
            - details
            - criteria
        QuizID:
          type: integer
        CreatedBy:
          type: integer
        trialRun:
          type: boolean
        lastPublished:
          nullable: true
        isCopilotEnabled:
          type: boolean
        FolderID:
          type: integer
      required:
      - DateCreated
      - DueDate
      - Grade
      - Name
      - Status
      - Subject
      - Course
      - Submissions
      - TeachersName
      - RubricID
      - FeedbackTemplateID
      - QuestionSet
      - QuizID
      - CreatedBy
      - trialRun
      - lastPublished
      - isCopilotEnabled
      - FolderID
    SubmissionsPostRequest:
      type: object
      properties:
        Analysis:
          type: string
        Status:
          type: string
        SubmissionID:
          type: integer
        AssignmentID:
          type: integer
        Collaborators:
          type: string
        SubmissionFiles:
          type: array
          items:
            type: object
            properties:
              AssignmentID:
                type: integer
              StudentID:
                type: string
              Data:
                type: string
            required:
            - AssignmentID
            - StudentID
            - Data
        files:
          type: array
          items:
            type: object
            properties:
              fileName:
                type: string
              fileSize:
                type: string
              icon:
                type: object
                properties:
                  type:
                    type: object
                    properties:
                      displayName:
                        type: string
                    required:
                    - displayName
                  key:
                    nullable: true
                  ref:
                    nullable: true
                  props:
                    type: object
                    properties: {}
                    required: []
                  _owner:
                    nullable: true
                required:
                - type
                - key
                - ref
                - props
                - _owner
            required:
            - fileName
            - fileSize
            - icon
        StudentID:
          type: string
        StudentName:
          type: string
        DateCreated:
          type: string
      required:
      - Analysis
      - Status
      - SubmissionID
      - AssignmentID
      - Collaborators
      - SubmissionFiles
      - files
      - StudentID
      - StudentName
      - DateCreated
