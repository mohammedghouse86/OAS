                  candidatesIds:
                    - 4d219801-adbe-4665-b7f4-3e75ad928583
                  name: Test1 Batch 2026-3-2
                  message: >-
                    <p style="margin:0;">

                    Dear <span class="ql-placeholder-content" data-id="candidate.firstName"
                    data-label="candidate.firstName" spellcheck="false">&#65279;<span
                    contenteditable="false">{{candidate.firstName}}</span>&#65279;</span>,

                    </p>


                    <br />

                    <p style="margin:0;">You are invited to complete <span class="ql-placeholder-content"
                    data-id="assessment.name" data-label="assessment.name" spellcheck="false">&#65279;<span
                    contenteditable="false">{{assessment.name}}</span>&#65279;</span> for <span
                    class="ql-placeholder-content" data-id="company.name" data-label="company.name"
                    spellcheck="false">&#65279;<span contenteditable="false">{{company.name}}</span>&#65279;</span>.<br
                    /><br /> The deadline to complete your assessment is <span class="ql-placeholder-content"
                    data-id="assessment.deadline" data-label="assessment.deadline" spellcheck="false">&#65279;<span
                    contenteditable="false">{{assessment.deadline}}</span>&#65279;</span>. Please ensure you submit it
                    before the deadline to avoid any issues.

                    </p>

                    <br />

                    <p style="margin:0;">

                    {{assessment.url}}

                    </p>

                    <br />

                    <p style="margin:0;">

                    If you experience any issues accessing the assessment, feel free to reach out to <a
                    href="mailto:help@evalufy.com">help@evalufy.com</a>.<br /><br /> Best regards,<br /><br /><span
                    class="ql-placeholder-content" data-id="company.name" data-label="company.name"
                    spellcheck="false">&#65279;<span contenteditable="false">{{company.name}}</span>&#65279;</span> Team

                    </p>

                    <br />
                  description: New
                  deadline: 2026-03-09
                  sender: null
                  subject: "{{company.name}} Invites You to Submit An Assessment"
                  emailTemplate: a8456a81-6085-45fc-a363-1a1a1fb794b6
                  isPublic: true
                  proctoringConfig:
                    status: false
                    detectOutOfWindow: false
                    noRemainingOuts: submitted
                    takeSnapshot: false
                    numberOfOuts: 4
                    snapshotInterval: 1
                  multipleAssessments: false
                  selectedAssessments: []
                  sendDeadlineEmail: true
                  batchPurposeDetail:
                    title: ""
                    description: ""
      responses:
        "200":
          description: Success
