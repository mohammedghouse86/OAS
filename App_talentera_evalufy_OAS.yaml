components:
  schemas:
    EnPostRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    EnPutRequest:
      type: object
      properties:
        assessmentId:
          type: string
        purposeId:
          type: string
        purposeType:
          type: string
        batchPurposeDetail:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
          required:
            - title
            - description
        name:
          type: string
        description:
          type: string
        deadline:
          type: string
        message:
          type: string
        isPublic:
          type: boolean
        subject:
          type: string
        emailTemplateMacros:
          type: array
          items:
            type: string
        emailTemplate:
          type: string
        evaluatorsIds:
          type: array
          items:
            type: string
        activeEvaluatorsCount:
          type: integer
        candidatesIds:
          type: array
          items:
            type: string
        proctoringConfig:
          type: object
          properties:
            status:
              type: boolean
            numberOfOuts:
              type: integer
            takeSnapshot:
              type: boolean
            noRemainingOuts:
              type: string
            snapshotInterval:
              type: integer
            detectOutOfWindow:
              type: boolean
          required:
            - status
            - numberOfOuts
            - takeSnapshot
            - noRemainingOuts
            - snapshotInterval
            - detectOutOfWindow
        multipleAssessments:
          type: boolean
        selectedAssessments:
          type: array
          items:
            type: string
        email_lang:
          type: string
        hasSmartVideo:
          type: boolean
        removedEvaluatorsIds:
          type: array
          items:
            type: string
      required:
        - assessmentId
        - purposeId
        - purposeType
        - batchPurposeDetail
        - name
        - description
        - deadline
        - message
        - isPublic
        - subject
        - emailTemplateMacros
        - emailTemplate
        - evaluatorsIds
        - activeEvaluatorsCount
        - candidatesIds
        - proctoringConfig
        - multipleAssessments
        - selectedAssessments
        - email_lang
        - hasSmartVideo
        - removedEvaluatorsIds
