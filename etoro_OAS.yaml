components:
  schemas:
    ApiPostRequest:
      type: object
      properties:
        LogEvents:
          type: array
          items:
            type: object
            properties:
              Message:
                type: string
              Categories:
                type: string
              Domain:
                type: string
              ProgressData:
                type: object
                properties:
                  loginGuid:
                    type: string
                  loginFlow:
                    type: string
                  duration:
                    type: integer
                  status:
                    type: string
                  actionName:
                    type: string
                  currentStep:
                    type: integer
                  stoppedFlow:
                    type: boolean
                required:
                  - loginGuid
                  - loginFlow
                  - duration
                  - status
                  - actionName
                  - currentStep
                  - stoppedFlow
              Level:
                type: string
              PushStatus:
                type: boolean
              Mode:
                type: string
              PageUrl:
                type: string
              IsLoggedIn:
                type: boolean
              CID:
                type: integer
              Username:
                type: string
              BatchIndex:
                type: integer
              ApplicationIdentifier:
                type: string
              ApplicationVersion:
                type: string
              SessionGuid:
                type: string
              UserSessionGuid:
                type: string
              LSSessionId:
                type: string
              ClientDateTime:
                type: string
              SecondsFromStartUp:
                type: integer
            required:
              - Message
              - Categories
              - Domain
              - ProgressData
              - Level
              - PushStatus
              - Mode
              - PageUrl
              - IsLoggedIn
              - CID
              - Username
              - BatchIndex
              - ApplicationIdentifier
              - ApplicationVersion
              - SessionGuid
              - UserSessionGuid
              - LSSessionId
              - ClientDateTime
              - SecondsFromStartUp
        MonitorEvents:
          type: array
          items:
            type: string
      required:
        - LogEvents
        - MonitorEvents
    ApiPutRequest:
      type: object
      properties:
        isAddressTwoLinerShown:
          type: integer
      required:
        - isAddressTwoLinerShown
    SapiPostRequest:
      type: object
      properties:
        instrumentIds:
          type: array
          items:
            type: integer
        InstrumentDataFilters:
          type: array
          items:
            type: string
        DelayIntervalMS:
          type: integer
      required:
        - instrumentIds
        - InstrumentDataFilters
        - DelayIntervalMS
    EventsPostRequest:
      type: object
      properties:
        event_name:
          type: string
        fb.dynamic_product_ads:
          type: object
          properties: {}
          required: []
        custom_data:
          type: object
          properties: {}
          required: []
        event_id:
          type: string
        fb.pixel_id:
          type: string
        fb.advanced_matching:
          type: object
          properties:
            external_id:
              type: string
            ph:
              type: string
          required:
            - external_id
            - ph
        website_context:
          type: object
          properties:
            location:
              type: string
            referrer:
              type: string
            isInIFrame:
              type: boolean
          required:
            - location
            - referrer
            - isInIFrame
        fb.fbp:
          type: string
        event_meta_info:
          type: object
          properties:
            experiment_detail:
              type: object
              properties:
                name:
                  type: string
                is_exposed:
                  type: boolean
                is_in_control:
                  type: boolean
                is_in_treatment:
                  type: boolean
              required:
                - name
                - is_exposed
                - is_in_control
                - is_in_treatment
            cc_info:
              type: object
              properties:
                ccs:
                  type: string
                cas:
                  type: string
              required:
                - ccs
                - cas
          required:
            - experiment_detail
            - cc_info
      required:
        - event_name
        - fb.dynamic_product_ads
        - custom_data
        - event_id
        - fb.pixel_id
        - fb.advanced_matching
        - website_context
        - fb.fbp
        - event_meta_info
    ApiDeleteRequest:
      type: array
      items:
        type: object
        properties:
          ItemType:
            type: string
          ItemId:
            type: integer
        required:
          - ItemType
          - ItemId
    _vercelPostRequest:
      type: object
      properties:
        o:
          type: string
        sv:
          type: string
        sdkn:
          type: string
        sdkv:
          type: string
        ts:
          type: integer
        r:
          type: string
      required:
        - o
        - sv
        - sdkn
        - sdkv
        - ts
        - r
    ValidatePostRequest:
      type: object
      properties:
        binCode:
          type: string
        gcid:
          type: integer
        depositType:
          type: integer
      required:
        - binCode
        - gcid
        - depositType
    SapiPutRequest:
      type: object
      properties:
        gcid:
          type: integer
        modeID:
          type: integer
      required:
        - gcid
        - modeID
    ServicePostRequest:
      type: object
      properties:
        symbols:
          type: array
          items:
            type: string
      required:
        - symbols
