components:
  schemas:
    Fp-aPostRequest:
      type: object
      properties:
        startDate:
          type: string
        numberOfMonths:
          type: integer
        burnRateType:
          type: string
      required:
        - startDate
        - numberOfMonths
        - burnRateType
    PlanPostRequest:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        lockDate:
          type: string
        message:
          type: string
        archived:
          type: boolean
        rolloverActuals:
          type: boolean
        planOfRecord:
          type: boolean
        invitees:
          type: array
          items:
            type: string
        showActualMonths:
          type: integer
      required:
        - name
        - startDate
        - endDate
        - lockDate
        - message
        - archived
        - rolloverActuals
        - planOfRecord
        - invitees
        - showActualMonths
    "{id}PostRequest":
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        settings:
          type: object
          properties:
            pivotState:
              type: object
              properties:
                columnState:
                  type: array
                  items:
                    type: object
                    properties:
                      colId:
                        type: string
                      width:
                        type: integer
                      hide:
                        type: boolean
                      pinned:
                        nullable: true
                      sort:
                        nullable: true
                      sortIndex:
                        nullable: true
                      aggFunc:
                        nullable: true
                      rowGroup:
                        type: boolean
                      rowGroupIndex:
                        nullable: true
                      pivot:
                        type: boolean
                      pivotIndex:
                        nullable: true
                      flex:
                        type: integer
                    required:
                      - colId
                      - width
                      - hide
                      - pinned
                      - sort
                      - sortIndex
                      - aggFunc
                      - rowGroup
                      - rowGroupIndex
                      - pivot
                      - pivotIndex
                      - flex
                filterModel:
                  type: object
                  properties: {}
                  required: []
                rowGroupColumns:
                  type: array
                  items:
                    type: string
                valueColumns:
                  type: array
                  items:
                    type: object
                    properties:
                      colId:
                        type: string
                      aggFunc:
                        type: string
                    required:
                      - colId
                      - aggFunc
                pivotColumns:
                  type: array
                  items:
                    type: string
                columnDefs:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      headerName:
                        type: string
                      sortable:
                        type: boolean
                      filter:
                        type: boolean
                      enablePivot:
                        type: boolean
                    required:
                      - field
                      - headerName
                      - sortable
                      - filter
                      - enablePivot
                sortModel:
                  type: array
                  items:
                    type: string
              required:
                - columnState
                - filterModel
                - rowGroupColumns
                - valueColumns
                - pivotColumns
                - columnDefs
                - sortModel
            pivotOptions:
              nullable: true
            pivotReport:
              nullable: true
            pivotColumns:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  headerName:
                    type: string
                  sortable:
                    type: boolean
                  filter:
                    type: boolean
                  enablePivot:
                    type: boolean
                required:
                  - field
                  - headerName
                  - sortable
                  - filter
                  - enablePivot
          required:
            - pivotState
            - pivotOptions
            - pivotReport
            - pivotColumns
      required:
        - name
        - type
        - settings
    Cap-tablePostRequest:
      type: object
      properties:
        expectedCloseDate:
          type: string
        preMoneyValuation:
          type: integer
        roundSize:
          type: integer
        includeConvertedShares:
          type: boolean
        refreshType:
          type: string
        poolRefresh:
          type: integer
        roundName:
          type: string
        planName:
          type: string
      required:
        - expectedCloseDate
        - preMoneyValuation
        - roundSize
        - includeConvertedShares
        - refreshType
        - poolRefresh
        - roundName
        - planName
    UserPostRequest:
      type: object
      properties:
        name:
          type: string
        legalName:
          type: string
        legalAddress:
          type: object
          properties:
            line1:
              type: string
            line2:
              type: string
            city:
              type: string
            state:
              type: string
            country:
              type: string
            zip:
              type: string
          required:
            - line1
            - line2
            - city
            - state
            - country
            - zip
        companyAddress:
          type: object
          properties:
            line1:
              type: string
            line2:
              type: string
            city:
              type: string
            state:
              type: string
            country:
              type: string
            zip:
              type: string
          required:
            - line1
            - line2
            - city
            - state
            - country
            - zip
      required:
        - name
        - legalName
        - legalAddress
        - companyAddress
    User-businessPostRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
      required:
        - email
        - role
    User-businessPutRequest:
      type: object
      properties:
        businessId:
          type: string
        refreshToken:
          type: string
      required:
        - businessId
        - refreshToken
