components:
  schemas:
    V1PostRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        date_of_birth:
          type: string
        gender:
          type: string
        address:
          type: string
        blood_type:
          type: string
        insurance_provider:
          type: string
        insurance_policy_number:
          type: string
        organization_id:
          type: string
        allergies:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        emergency_contact:
          type: object
          properties: {}
          required: []
      required:
        - name
        - email
        - phone
        - date_of_birth
        - gender
        - address
        - blood_type
        - insurance_provider
        - insurance_policy_number
        - organization_id
        - allergies
        - conditions
        - emergency_contact
    V1PatchRequest:
      type: object
      properties:
        status:
          type: string
      required:
        - status
