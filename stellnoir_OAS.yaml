openapi: 3.0.3
info:
  title: Stellnoir App
  version: 1.0.0
servers:
  - url: https://staging.stellnoir.com
tags:
  - name: account
  - name: api
  - name: build
  - name: cart
  - name: checkout
  - name: concierge
  - name: default
  - name: festivities
  - name: login
  - name: logout
  - name: products
  - name: register
  - name: shipping
  - name: story
  - name: trace
  - name: v1
  - name: v2
  - name: wishlist
paths:
  /register:
    post:
      tags:
        - register
      summary: POST /register
      operationId: post_register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPostRequest"
            examples:
              fromHar:
                value:
                  name: test2 mir
                  email: test2mir786@gmail.com
                  phone: ""
                  password: Welcome@1234
                  password_confirmation: Welcome@1234
      responses:
        "200":
          description: Success
  /account:
    get:
      tags:
        - account
      summary: GET /account
      operationId: get_account
      responses:
        "200":
          description: Success
  /logout:
    post:
      tags:
        - logout
      summary: POST /logout
      operationId: post_logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutPostRequest"
            examples:
              fromHar:
                value: {}
      responses:
        "200":
          description: Success
  /:
    get:
      tags:
        - default
      summary: GET /
      operationId: get_root
      responses:
        "200":
          description: Success
  /login:
    get:
      tags:
        - login
      summary: GET /login
      operationId: get_login
      responses:
        "200":
          description: Success
    post:
      tags:
        - login
      summary: POST /login
      operationId: post_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginPostRequest"
            examples:
              fromHar:
                value:
                  email: test2mir786@gmail.com
                  password: Welcome@1234
                  remember: false
      responses:
        "200":
          description: Success
  /story:
    get:
      tags:
        - story
      summary: GET /story
      operationId: get_story
      responses:
        "200":
          description: Success
  /concierge:
    get:
      tags:
        - concierge
      summary: GET /concierge
      operationId: get_concierge
      responses:
        "200":
          description: Success
  /products:
    get:
      tags:
        - products
      summary: GET /products
      operationId: get_products
      parameters:
        - name: material[]
          in: query
          required: false
          schema:
            type: string
          example: Full-Grain Vegetable-Tanned Leather (Cognac)
        - name: color[]
          in: query
          required: false
          schema:
            type: string
          example: Cognac Brown
        - name: category[]
          in: query
          required: false
          schema:
            type: string
          example: belts
      responses:
        "200":
          description: Success
  /wishlist/check/{id}:
    get:
      tags:
        - wishlist
      summary: GET /wishlist/check/{id}
      operationId: get_wishlist_check_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "18"
        - name: product_variant_id
          in: query
          required: false
          schema:
            type: string
          example: "33"
      responses:
        "200":
          description: Success
  /wishlist/toggle:
    post:
      tags:
        - wishlist
      summary: POST /wishlist/toggle
      operationId: post_wishlist_toggle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistPostRequest"
            examples:
              fromHar:
                value:
                  product_id: 18
                  product_variant_id: 33
      responses:
        "200":
          description: Success
  /products/{id}:
    get:
      tags:
        - products
      summary: GET /products/{id}
      operationId: get_products_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: perla-woven-crossbody
      responses:
        "200":
          description: Success
  /cart:
    post:
      tags:
        - cart
      summary: POST /cart
      operationId: post_cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartPostRequest"
            examples:
              fromHar:
                value:
                  product_id: 17
                  product_variant_id: 32
                  quantity: 1
      responses:
        "200":
          description: Success
    get:
      tags:
        - cart
      summary: GET /cart
      operationId: get_cart
      responses:
        "200":
          description: Success
  /trace/{id}:
    get:
      tags:
        - trace
      summary: GET /trace/{id}
      operationId: get_trace_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 8ac21b083cc94bc98c8b33bc3703ab8e808698b486dd49c18e2672c0e0bbccdd
      responses:
        "200":
          description: Success
    post:
      tags:
        - trace
      summary: POST /trace/{id}
      operationId: post_trace_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: verify-ownership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TracePostRequest"
            examples:
              fromHar:
                value:
                  order_reference: ORD-78561
                  email: test2mir786@gmail.com
                  otp: "796111"
                  product_id: 17
      responses:
        "200":
          description: Success
  /checkout:
    get:
      tags:
        - checkout
      summary: GET /checkout
      operationId: get_checkout
      responses:
        "200":
          description: Success
  /shipping/calculate-rates:
    post:
      tags:
        - shipping
      summary: POST /shipping/calculate-rates
      operationId: post_shipping_calculate_rates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShippingPostRequest"
            examples:
              fromHar:
                value:
                  to_pincode: "400001"
      responses:
        "200":
          description: Success
  /checkout/razorpay/create-order:
    post:
      tags:
        - checkout
      summary: POST /checkout/razorpay/create-order
      operationId: post_checkout_razorpay_create_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutPostRequest"
            examples:
              fromHar:
                value:
                  amount: 106200
                  currency: INR
                  order_data:
                    email: test2mir786@gmail.com
                    phone: "917428730894"
                    newsletter: false
                    firstName: test2
                    lastName: mir
                    addressLine1: kashmir gate 2
                    addressLine2: sultan road
                    pin: "400001"
                    city: Pahlgam
                    state: Jammu and Kashmir
                    country: India
                    giftNote: hi
                    shippingMethod: standard
                    paymentMethod: razorpay
                    total: "106200.00"
      responses:
        "200":
          description: Success
  /v1/track:
    post:
      tags:
        - v1
      summary: POST /v1/track
      operationId: post_v1_track
      parameters:
        - name: key_id
          in: query
          required: false
          schema:
            type: string
          example: rzp_test_RsCxluB0k2uAYV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1PostRequest"
            examples:
              fromHar:
                value:
                  key: ZmY5N2M0YzVkN2JiYzkyMWM1ZmVmYWJk
                  mode: live
                  events:
                    - event: open
                      timestamp: 1773290514314
                      checkout_id: SQBb9hk3aSAW9R
                      merchant_id: ""
                      event_version: v2
                      event_type: checkout
                      build_id: 22888930478
                      platform: 1
                      product: 1
                      view: 1
                      env: 1
                      properties:
                        options:
                          key: rzp_test_RsCxluB0k2uAYV
                          amount: 10620000
                          currency: INR
                          name: Stellnoir
                          description: Luxury Products Purchase
                          order_id: order_SQBb9fv3OW7YDK
                          prefill.name: test2 mir
                          prefill.email: test2mir786@gmail.com
                          prefill.contact: "917428730894"
                          theme.color: "#000000"
                        in_iframe: 0
      responses:
        "200":
          description: Success
  /v2/{id}/preferences:
    post:
      tags:
        - v2
      summary: POST /v2/{id}/preferences
      operationId: post_v2_id_preferences
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: standard_checkout
        - name: key_id
          in: query
          required: false
          schema:
            type: string
          example: rzp_test_RsCxluB0k2uAYV
        - name: session_token
          in: query
          required: false
          schema:
            type: string
          example: 9B53926D9D2A4D5FBF35DFA681DD2AB7C846857224FACA4FAAD6C9E9765CB0484EBEC8673BCB917F2528DCFA964DDDB59CF30C52064FB7070DE42CF5D7C2DCF4B28244630C5684EE53F13858A40F7D2BC52A06DCA1ED18FF4AD43E9EF18C637B2902EEB872EE80DC
