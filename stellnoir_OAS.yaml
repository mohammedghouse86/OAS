            type: string
          example: "true"
        - name: _[platform]
          in: query
          required: false
          schema:
            type: string
          example: browser
      responses:
        "200":
          description: Success
  /festivities/configs.json:
    get:
      tags:
        - festivities
      summary: GET /festivities/configs.json
      operationId: get_festivities_configs_json
      responses:
        "200":
          description: Success
