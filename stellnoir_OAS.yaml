                    currency: INR
                    option_currency: INR
                    truecaller: false
                    qr_required: true
                    checkout_id: SQBb9hk3aSAW9R
                    library: checkoutjs
                    platform: browser
                    referrer_domain: staging.stellnoir.com
                    order_id: order_SQBb9fv3OW7YDK
                  action: get
      responses:
        "200":
          description: Success
  /v1/{id}/customers/status/+917428730894:
    get:
      tags:
        - v1
      summary: GET /v1/{id}/customers/status/+917428730894
      operationId: get_v1_id_customers_status__917428730894
      parameters:
        - name: id
          in: path
          required: true
