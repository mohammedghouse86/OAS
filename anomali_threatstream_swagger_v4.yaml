      - csrfToken: []
    post:
      summary: Create a Course of Action
      operationId: post_courseofaction
      tags:
      - Threat Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              name: asdf
              is_public: false
              tags_v2: []
              publication_status: new
              tlp: null
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/courseofaction/{id}:
    get:
      summary: Retrieve Course of Action by ID
      operationId: get_courseofaction_id
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      - name: skip_intelligence
        in: query
        required: false
        schema:
          type: boolean
