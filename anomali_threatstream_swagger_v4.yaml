      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              title: ''
              body: '<p>Comment text here</p>'
              tlp: red
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
