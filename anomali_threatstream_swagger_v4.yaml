        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
    patch:
      summary: Update Course of Action by ID
      operationId: patch_courseofaction_id
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              name: asdf
              description: Updated description
              body_content_type: richtext
              publication_status: new
              tlp: null
              tags_v2: []
              is_public: false
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/courseofaction/{id}/association_counts:
    get:
      summary: Retrieve association counts for a Course of Action
      operationId: get_courseofaction_id_association_counts
      tags:
