          example: 200
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          example: 0
      - name: order_by
        in: query
        required: false
        schema:
          type: string
          example: name
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/courseofaction:
    get:
      summary: List Course of Action records
      operationId: get_courseofaction
