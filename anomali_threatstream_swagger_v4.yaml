openapi: 3.0.3
info:
  title: ThreatStream Optic API - Additions
  description: >
    53 endpoints found in browser traffic (Admin, Can_Audit, Read_Only roles)
    that were missing from anomali_threatstream_swagger_v3.yaml.
    Merge the paths below into the existing YAML's paths: section.
  version: 2.0.0
servers:
- url: https://stgeks2-optic.threatstream.com
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: stgeks2opticsessionid
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRFToken
paths:
  /api/v1/alfred/dashboard:
    get:
      summary: Retrieve Alfred dashboard
      operationId: get_alfred_dashboard
      tags:
      - Intelligence Initiative
      parameters:
      - name: sync
        in: query
        required: false
        schema:
          type: boolean
          example: false
      - name: type
        in: query
        required: false
        schema:
          type: string
          example: intelligenceinitiatives
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/alfred/async/{id}:
    get:
      summary: Retrieve Alfred async result by ID
      operationId: get_alfred_async_id
      tags:
      - Intelligence Initiative
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 12345
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/attackpattern/{id}:
    get:
      summary: Retrieve Attack Pattern by ID
      operationId: get_attackpattern_id
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      - name: skip_intelligence
        in: query
        required: false
        schema:
          type: boolean
          example: true
      - name: skip_associations
        in: query
        required: false
        schema:
          type: boolean
          example: true
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
    patch:
      summary: Update Attack Pattern by ID
      operationId: patch_attackpattern_id
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              name: T1566.001 - Spearphishing Attachment
              description: Updated description
              publication_status: published
              tlp: green
              tags_v2: []
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/attackpattern/{id}/association_counts:
    get:
      summary: Retrieve association counts for an Attack Pattern
      operationId: get_attackpattern_id_association_counts
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/attackpattern/{id}/comment:
    get:
      summary: Retrieve comments for an Attack Pattern
      operationId: get_attackpattern_id_comment
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          example: 0
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          example: 0
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/attackpattern/{id}/investigations:
    get:
      summary: Retrieve investigations linked to an Attack Pattern
      operationId: get_attackpattern_id_investigations
      tags:
      - Threat Models
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 18796
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          example: 10
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          example: 0
      - name: order_by
        in: query
        required: false
        schema:
          type: string
          example: investigation__name
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - cookieAuth: []
      - csrfToken: []
  /api/v1/channel/{id}:
