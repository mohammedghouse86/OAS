components:
  schemas:
    AppointmentPostRequest:
      type: object
      properties:
        to:
          nullable: true
        from:
          nullable: true
        mrn:
          nullable: true
        patientLastName:
          nullable: true
        patientFirstName:
          nullable: true
        specialistName:
          nullable: true
        pageIndex:
          type: integer
        pageSize:
          type: integer
        isFilterOn:
          type: boolean
        partnersiteId:
          type: integer
      required:
        - to
        - from
        - mrn
        - patientLastName
        - patientFirstName
        - specialistName
        - pageIndex
        - pageSize
        - isFilterOn
        - partnersiteId
    FacilityPostRequest:
      type: object
      properties:
        pageIndex:
          type: integer
        pageSize:
          type: integer
        filter:
          type: string
      required:
        - pageIndex
        - pageSize
        - filter
    UserPatchRequest:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        mobileNumber:
          type: string
        address:
          type: string
        address1:
          type: string
        cityName:
          type: string
        countryId:
          type: integer
        zipCode:
          type: string
        stateId:
          type: integer
      required:
        - id
        - firstName
        - lastName
        - mobileNumber
        - address
        - address1
        - cityName
        - countryId
        - zipCode
        - stateId
    "{id}PutRequest":
      type: object
      properties:
        facilityId:
          nullable: true
        facilityGroupId:
          type: integer
        specialityId:
          type: integer
        year:
          type: integer
        month:
          type: integer
        day:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              isDeleted:
                type: boolean
              specialityId:
                type: integer
              specialistId:
                type: integer
              specialistFirstName:
                type: string
              specialistLastName:
                type: string
              specialistFullName:
                type: string
              specialistMobileNumber:
                type: string
              shiftId:
                type: integer
              shiftStartTime:
                type: string
              shiftEndTime:
                type: string
              shiftStartTimeInUTC:
                type: string
              shiftEndTimeInUTC:
                type: string
              utcDSTOffsetInSeconds:
                type: integer
              timeZoneDescription:
                type: string
            required:
              - id
              - isDeleted
              - specialityId
              - specialistId
              - specialistFirstName
              - specialistLastName
              - specialistFullName
              - specialistMobileNumber
              - shiftId
              - shiftStartTime
              - shiftEndTime
              - shiftStartTimeInUTC
              - shiftEndTimeInUTC
              - utcDSTOffsetInSeconds
              - timeZoneDescription
        inTimeZone:
          type: string
        utcOffset:
          type: integer
      required:
        - facilityId
        - facilityGroupId
        - specialityId
        - year
        - month
        - day
        - details
        - inTimeZone
        - utcOffset
