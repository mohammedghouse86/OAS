            type: string
          example: "2.1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/{id}PutRequest"
            examples:
              fromHar:
                value:
                  facilityId: null
                  facilityGroupId: 249
                  specialityId: 5
                  year: 2026
                  month: 4
                  day: "17"
                  details:
                    - id: 0
                      isDeleted: false
                      specialityId: 5
                      specialistId: 980
                      specialistFirstName: Ali
                      specialistLastName: Hamza
                      specialistFullName: Hamza Ali
                      specialistMobileNumber: ""
                      shiftId: 1
                      shiftStartTime: 2026-04-17T05:00:00.000Z
                      shiftEndTime: 2026-04-17T06:00:00.000Z
                      shiftStartTimeInUTC: 2026-04-17T05:00:00.000Z
                      shiftEndTimeInUTC: 2026-04-17T06:00:00.000Z
                      utcDSTOffsetInSeconds: -18000
                      timeZoneDescription: UTC
                  inTimeZone: UTC
                  utcOffset: -18000
