components:
  schemas:
    ApiPostRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            name:
              type: string
            address:
              type: string
            countryCode:
              type: string
            companyCode:
              type: string
            vatCode:
              type: string
            ruKppVatPayer:
              type: object
              properties:
                kpp:
                  type: string
                isVatPayer:
                  type: boolean
              required:
                - kpp
                - isVatPayer
            email:
              type: string
            badEmail:
              type: boolean
            contactPhone:
              type: string
            moreVisible:
              type: boolean
          required:
            - name
            - address
            - countryCode
            - companyCode
            - vatCode
            - ruKppVatPayer
            - email
            - badEmail
            - contactPhone
            - moreVisible
        csrfToken:
          type: string
      required:
        - user
        - csrfToken
    My-WebsitesPostRequest:
      type: object
      properties: {}
      required: []
    MpPostRequest:
      type: object
      properties:
        list:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              ts:
                type: integer
            required:
              - id
              - type
              - ts
        ts:
          type: integer
      required:
        - list
        - ts
    MailboxPostRequest:
      type: object
      properties:
        domainId:
          type: integer
        emailUser:
          type: string
        emailPassword:
          type: string
        token:
          type: string
      required:
        - domainId
        - emailUser
        - emailPassword
        - token
    SupportPostRequest:
      type: object
      properties:
        sourcePageId:
          type: integer
      required:
        - sourcePageId
    UlPostRequest:
      type: object
      properties:
        action:
          type: string
      required:
        - action
    ProfilePostRequest:
      type: object
      properties:
        oneTime2FAToken:
          type: string
      required:
        - oneTime2FAToken
    My-AccountingPostRequest:
      type: object
      properties:
        acceptRules:
          type: boolean
        name:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          nullable: true
        avatars:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
        verificationToken:
          type: string
      required:
        - acceptRules
        - name
        - lastName
        - fullName
        - email
        - phone
        - avatars
        - errors
        - verificationToken
    My-LicensesPostRequest:
      type: object
      properties:
        csrfToken:
          type: string
        url:
          type: string
        customerCount:
          type: string
      required:
        - csrfToken
        - url
        - customerCount
