              - zwfn3nwlpvcllaz7hj7l4b4p5q
              tenantVisibility: NONE
      responses:
        '200':
          description: Permission boundary created.
  /api/v1/auth-session-policies:
    post:
      tags:
      - Policies
      summary: Create or update an auth session policy
      operationId: upsertAuthSessionPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSessionPolicyRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              cookiePersistenceType: PERSISTENT
              idleSessionTimeout: PT4320M
              absoluteSessionTimeout: PT10080M
      responses:
        '200':
          description: Auth session policy saved.
  /api/v1/bot-detection-policies:
    post:
      tags:
      - Policies
      summary: Create or update a bot detection policy
      operationId: upsertBotDetectionPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotDetectionPolicyRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              loginCaptchaEnforcementStrategy: NEVER
      responses:
        '200':
          description: Bot detection policy saved.
  /api/v1/mfa-policies:
    post:
      tags:
      - Policies
      summary: Create or update an MFA policy
      operationId: upsertMfaPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaPolicyRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              allowedAuthFactors: []
              enrollmentStrategy: OPTIONAL
              totpSettings:
                issuer: null
      responses:
        '200':
          description: MFA policy saved.
  /api/v1/password-policies:
    post:
      tags:
      - Policies
      summary: Create or update a password policy
      operationId: upsertPasswordPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordPolicyRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              minimumLength: 8
              lowercaseCharRequired: true
              uppercaseCharRequired: false
              digitRequired: false
              specialCharRequired: false
              breachedPwdDetectionEnabled: false
              breachedPwdLoginRemediationStrategy: NONE
      responses:
        '200':
          description: Password policy saved.
  /api/v1/role-assignment-policies:
    post:
      tags:
