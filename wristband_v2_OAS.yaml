      summary: Create or update a role assignment policy
      operationId: upsertRoleAssignmentPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignmentPolicyRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              defaultSignupRoles:
              - ybaqs4tmh5cwpj4p2dnchwf5na
              defaultIdpUserSyncRoles:
              - ybaqs4tmh5cwpj4p2dnchwf5na
              - vs62a73zyveyfe5bvtcy3vts6e
      responses:
        '200':
          description: Role assignment policy saved.
  /api/v1/signing-keys/{signingKeyId}:
    delete:
      tags:
      - Signing Keys
