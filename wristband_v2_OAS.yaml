      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              name: saa
              displayName: aaa
              tenantVisibility: NONE
              tenantVisibilityInclusionList: []
      responses:
        '200':
          description: Role created.
  /api/v1/permissions:
    post:
      tags:
      - Permissions
      summary: Create a permission
      operationId: createPermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionRequest'
            example:
              type: CUSTOM
              applicationId: 4hkv6bxrwzcbtnw7pt264auuki
              value: aa
              description: aa
              tenantVisibility: ALL
      responses:
        '200':
          description: Permission created.
  /api/v1/permission-groups:
    post:
      tags:
      - Permission Groups
      summary: Create a permission group
      operationId: createPermissionGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionGroupRequest'
            example:
              ownerType: APPLICATION
              ownerId: 4hkv6bxrwzcbtnw7pt264auuki
              name: newpemissiongroup
              displayName: New Permission Group
              tenantVisibility: NONE
      responses:
        '200':
          description: Permission group created.
  /api/v1/permission-boundaries:
    post:
      tags:
