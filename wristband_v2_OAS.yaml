              status: ENABLED
              loginIdentifiers:
              - EMAIL
              loginFactors:
              - PASSWORD
              primaryLoginFactor: PASSWORD
      responses:
        '200':
          description: Identity provider created or updated.
  /api/v1/roles:
    post:
      tags:
