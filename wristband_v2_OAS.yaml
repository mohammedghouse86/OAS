      operationId: deleteSigningKey
      parameters:
      - name: signingKeyId
        in: path
        required: true
        description: The signing key ID.
        example: ydtvovcvejev3ogxl6lcxfzaya
        schema:
          type: string
      responses:
        '204':
          description: Signing key deleted.
components:
  parameters:
    applicationId:
      name: applicationId
      in: path
      required: true
      description: The application ID.
      example: 4hkv6bxrwzcbtnw7pt264auuki
      schema:
        type: string
    workspaceId:
      name: workspaceId
      in: path
      required: true
      description: The workspace ID.
      example: 6yolumoxvngfpppgimaowlvypm
      schema:
        type: string
    tenantId:
      name: tenantId
      in: path
      required: true
      description: The tenant ID.
      example: xzzfjkk4fbh75amy2zggyglueu
      schema:
        type: string
    userId:
      name: userId
      in: path
      required: true
      description: The user ID.
      example: xj3syphvovfolkmeqwycpllu4y
      schema:
        type: string
    startIndex:
      name: start_index
      in: query
      description: 1-based index of the first record to return.
      example: 1
      schema:
        type: integer
        default: 1
    count:
      name: count
      in: query
      description: Maximum number of records to return.
      example: 10
      schema:
        type: integer
        default: 10
  schemas:
    ResolveAccountUsageRequest:
      type: object
      properties:
        startDate:
          type: string
          format: date
          example: '2026-06-01'
        endDate:
          type: string
          format: date
          example: '2026-06-09'
        overageThreshold:
          type: integer
          example: 10000
        globalTenantOverageThreshold:
          type: integer
          example: 10000
    UpdateApplicationRequest:
      type: object
      properties:
        displayName:
          type: string
        tenantClassifier:
          type: string
          enum:
          - COMPANY
          - PERSONAL
          - ANY
        loginUrl:
          type: string
          format: uri
        logoutUrls:
          type: array
          items:
            type: string
            format: uri
        allowedOrigins:
          type: array
          items:
            type: string
            format: uri
        signupEnabled:
          type: boolean
    CreateTenantRequest:
      type: object
      required:
      - applicationId
      - type
      - displayName
      - name
      properties:
        applicationId:
          type: string
        type:
          type: string
          enum:
          - STANDARD
          - GLOBAL
        displayName:
          type: string
        name:
          type: string
    UpdateTenantRequest:
      type: object
      properties:
        displayName:
          type: string
        description:
          type: string
        logoUrl:
          type: string
    CreateUserRequest:
      type: object
      required:
      - tenantId
      - identityProviderName
      - email
      properties:
        tenantId:
          type: string
        identityProviderName:
          type: string
        email:
          type: string
          format: email
        sendInvitation:
          type: boolean
        rolesToAssign:
          type: array
          items:
            type: string
    UpdateUserRequest:
      type: object
      properties:
        givenName:
          type: string
        middleName:
          type: string
        familyName:
          type: string
        honorificPrefix:
          type: string
          nullable: true
        honorificSuffix:
          type: string
          nullable: true
        nickname:
          type: string
        fullName:
          type: string
        displayName:
          type: string
        gender:
          type: string
        username:
          type: string
        externalId:
          type: string
        timeZone:
          type: string
          example: America/Los_Angeles
        locale:
          type: string
          example: en-US
        preferredLanguage:
          type: string
          example: en-US
        phoneNumber:
          type: string
        birthdate:
          type: string
          format: date
          nullable: true
        pictureUrl:
          type: string
    CreateClientRequest:
      type: object
      required:
      - ownerType
      - ownerId
      - name
      - type
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
          - MACHINE_TO_MACHINE
          - PUBLIC
          - CONFIDENTIAL
        grantTypes:
          type: array
          items:
            type: string
            enum:
            - CLIENT_CREDENTIALS
            - AUTHORIZATION_CODE
            - REFRESH_TOKEN
        accessTokenLifetime:
          type: string
          description: ISO 8601 duration.
          example: PT1440M
    CreateIdentityProviderRequest:
      type: object
      required:
      - ownerId
      - ownerType
      - name
      - type
      properties:
        ownerId:
          type: string
        ownerType:
          type: string
          enum:
          - APPLICATION
        name:
          type: string
        type:
          type: string
          enum:
          - WRISTBAND
          - SOCIAL
        status:
          type: string
          enum:
          - ENABLED
          - DISABLED
        loginIdentifiers:
          type: array
          items:
            type: string
            enum:
            - EMAIL
            - PHONE
        loginFactors:
          type: array
          items:
            type: string
            enum:
            - PASSWORD
            - MAGIC_LINK
            - OTP
        primaryLoginFactor:
          type: string
          enum:
          - PASSWORD
          - MAGIC_LINK
          - OTP
    CreateRoleRequest:
      type: object
      required:
      - ownerType
      - ownerId
      - name
      - displayName
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        name:
          type: string
        displayName:
          type: string
        tenantVisibility:
          type: string
          enum:
          - NONE
          - ALL
          - INCLUSION_LIST
        tenantVisibilityInclusionList:
          type: array
          items:
            type: string
    CreatePermissionRequest:
      type: object
      required:
      - type
      - applicationId
      - value
      properties:
        type:
          type: string
          enum:
          - CUSTOM
          - PREDEFINED
        applicationId:
          type: string
        value:
          type: string
        description:
          type: string
        tenantVisibility:
          type: string
          enum:
          - NONE
          - ALL
          - INCLUSION_LIST
    CreatePermissionGroupRequest:
      type: object
      required:
      - ownerType
      - ownerId
      - name
      - displayName
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        name:
          type: string
        displayName:
          type: string
        tenantVisibility:
          type: string
          enum:
          - NONE
          - ALL
          - INCLUSION_LIST
    CreatePermissionBoundaryRequest:
      type: object
      required:
      - ownerType
      - ownerId
      - type
      - name
      - displayName
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        type:
          type: string
          enum:
          - TENANT_EXCLUSION_LIST
          - TENANT_INCLUSION_LIST
        name:
          type: string
        displayName:
          type: string
        value:
          type: string
          nullable: true
        resourceList:
          type: array
          items:
            type: string
        tenantVisibility:
          type: string
          enum:
          - NONE
          - ALL
          - INCLUSION_LIST
    AuthSessionPolicyRequest:
      type: object
      required:
      - ownerType
      - ownerId
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        cookiePersistenceType:
          type: string
          enum:
          - PERSISTENT
          - SESSION
        idleSessionTimeout:
          type: string
          description: ISO 8601 duration.
          example: PT4320M
        absoluteSessionTimeout:
          type: string
          description: ISO 8601 duration.
          example: PT10080M
    BotDetectionPolicyRequest:
      type: object
      required:
      - ownerType
      - ownerId
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        loginCaptchaEnforcementStrategy:
          type: string
          enum:
          - NEVER
          - ALWAYS
          - RISK_BASED
    MfaPolicyRequest:
      type: object
      required:
      - ownerType
      - ownerId
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        allowedAuthFactors:
          type: array
          items:
            type: string
        enrollmentStrategy:
          type: string
          enum:
          - OPTIONAL
          - REQUIRED
        totpSettings:
          type: object
          properties:
            issuer:
              type: string
              nullable: true
    PasswordPolicyRequest:
      type: object
      required:
      - ownerType
      - ownerId
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        minimumLength:
          type: integer
          example: 8
        lowercaseCharRequired:
          type: boolean
        uppercaseCharRequired:
          type: boolean
        digitRequired:
          type: boolean
        specialCharRequired:
          type: boolean
        breachedPwdDetectionEnabled:
          type: boolean
        breachedPwdLoginRemediationStrategy:
          type: string
          enum:
          - NONE
          - FORCE_RESET
          - WARN
    RoleAssignmentPolicyRequest:
      type: object
      required:
      - ownerType
      - ownerId
      properties:
        ownerType:
          type: string
          enum:
          - APPLICATION
        ownerId:
          type: string
        defaultSignupRoles:
          type: array
          items:
            type: string
        defaultIdpUserSyncRoles:
          type: array
          items:
            type: string
