openapi: 3.0.3
info:
  title: Wristband Dashboard API
  description: API for the Wristband Dashboard — manages applications, tenants, users, clients, roles, permissions, policies,
    and branding.
  version: 1.0.0
servers:
- url: https://purple.dashboard.wristband.dev
  description: Production
tags:
- name: Session
  description: Session and profile data
- name: Workspaces
  description: Workspace-level operations
- name: Applications
  description: Application management
- name: Tenants
  description: Tenant management
- name: Users
  description: User management
- name: Clients
  description: OAuth client management
- name: Identity Providers
  description: Identity provider configuration
- name: Roles
  description: Role management
- name: Permissions
  description: Permission management
- name: Permission Groups
  description: Permission group management
- name: Permission Boundaries
  description: Permission boundary management
- name: Signing Keys
  description: JWT signing key management
- name: Policies
  description: Auth session, MFA, password, bot-detection, role-assignment, webhook, workflow, and email policies
- name: Brandings
  description: Page and email branding
- name: Custom Claims
  description: Custom JWT claims
paths:
  /api/v1/session-data:
    get:
      tags:
      - Session
      summary: Get session data
      description: Returns the current authenticated user's session information.
      operationId: getSessionData
      responses:
        '200':
          description: Session data returned successfully.
  /api/v1/profile-settings-data/{userId}:
    get:
      tags:
      - Session
      summary: Get profile settings data for a user
      operationId: getProfileSettingsData
      parameters:
      - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: Profile settings returned successfully.
  /api/v1/workspaces/{workspaceId}/applications:
    get:
      tags:
      - Workspaces
      summary: List applications in a workspace
      operationId: listWorkspaceApplications
      parameters:
      - $ref: '#/components/parameters/workspaceId'
      - name: fields
        in: query
        description: Comma-separated list of fields to return.
        example: id,name,vanityDomain,displayName,isMultiTenant,environmentType,status,metadata.creationTime
        schema:
          type: string
      responses:
        '200':
          description: List of applications returned.
  /api/v1/workspaces/{workspaceId}/application-usage-select-options:
    get:
      tags:
      - Workspaces
      summary: Get application usage select options for a workspace
      operationId: getWorkspaceApplicationUsageSelectOptions
      parameters:
      - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Select options returned.
  /api/v1/workspaces/{workspaceId}/resolve-account-usage:
    post:
      tags:
      - Workspaces
      summary: Resolve account usage for a workspace
      operationId: resolveWorkspaceAccountUsage
      parameters:
      - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveAccountUsageRequest'
            example:
              startDate: '2026-06-01'
              endDate: '2026-06-09'
              overageThreshold: 10000
              globalTenantOverageThreshold: 10000
      responses:
        '200':
          description: Account usage resolved successfully.
  /api/v1/applications/{applicationId}:
    get:
      tags:
      - Applications
      summary: Get an application
      operationId: getApplication
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Application returned.
    patch:
      tags:
      - Applications
      summary: Update an application
      operationId: updateApplication
      parameters:
      - $ref: '#/components/parameters/applicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
            example:
              displayName: ASP.NET (C#) backend, React frontend Demo
              tenantClassifier: COMPANY
              loginUrl: http://localhost:6001/api/auth/login
              logoutUrls:
              - http://localhost:6001
              allowedOrigins:
              - http://localhost:6001
              signupEnabled: true
      responses:
        '200':
          description: Application updated.
  /api/v1/applications/{applicationId}/application-context:
    get:
      tags:
      - Applications
      summary: Get application context
      operationId: getApplicationContext
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Application context returned.
  /api/v1/applications/{applicationId}/custom-domains:
    get:
      tags:
      - Applications
      summary: List custom domains for an application
      operationId: listApplicationCustomDomains
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Custom domains returned.
  /api/v1/applications/{applicationId}/tenant-select-options:
    get:
      tags:
      - Applications
      summary: Get tenant select options for an application
      operationId: getApplicationTenantSelectOptions
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Tenant select options returned.
  /api/v1/applications/{applicationId}/resolve-account-usage:
    post:
      tags:
      - Applications
      summary: Resolve account usage for an application
      operationId: resolveApplicationAccountUsage
      parameters:
      - $ref: '#/components/parameters/applicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveAccountUsageRequest'
            example:
              startDate: '2026-06-01'
              endDate: '2026-06-09'
              overageThreshold: 10000
              globalTenantOverageThreshold: 10000
      responses:
        '200':
          description: Account usage resolved.
  /api/v1/applications/{applicationId}/tenants:
    get:
      tags:
      - Applications
      - Tenants
      summary: List tenants for an application
      operationId: listApplicationTenants
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        description: Comma-separated list of fields to return.
        example: id,type,name,displayName,logoUrl,status
        schema:
          type: string
      - name: query
        in: query
        description: Filter expression (e.g. `type eq "GLOBAL"`).
        example: type eq "GLOBAL"
        schema:
          type: string
      responses:
        '200':
          description: Tenant list returned.
  /api/v1/applications/{applicationId}/clients:
    get:
      tags:
      - Applications
      - Clients
      summary: List clients for an application
      operationId: listApplicationClients
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        description: Comma-separated list of fields to return.
        example: id,name,type
        schema:
          type: string
      responses:
        '200':
          description: Client list returned.
  /api/v1/applications/{applicationId}/roles:
    get:
      tags:
      - Applications
      - Roles
      summary: List roles for an application
      operationId: listApplicationRoles
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,name,displayName,tenantVisibility
        schema:
          type: string
      - name: include_predefined_roles
        in: query
        description: Whether to include predefined roles.
        example: false
        schema:
          type: boolean
      - name: query
        in: query
        description: Filter expression.
        example: type eq "CUSTOM"
        schema:
          type: string
      responses:
        '200':
          description: Role list returned.
  /api/v1/applications/{applicationId}/permissions:
    get:
      tags:
      - Applications
      - Permissions
      summary: List permissions for an application
      operationId: listApplicationPermissions
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,type,value,description,tenantVisibility,metadata
        schema:
          type: string
      - name: include_predefined_permissions
        in: query
        example: false
        schema:
          type: boolean
      - name: query
        in: query
        example: type eq "CUSTOM"
        schema:
          type: string
      responses:
        '200':
          description: Permission list returned.
  /api/v1/applications/{applicationId}/permission-groups:
    get:
      tags:
      - Applications
      - Permission Groups
      summary: List permission groups for an application
      operationId: listApplicationPermissionGroups
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,name,displayName,tenantVisibility
        schema:
          type: string
      responses:
        '200':
          description: Permission group list returned.
  /api/v1/applications/{applicationId}/permission-boundaries:
    get:
      tags:
      - Applications
      - Permission Boundaries
      summary: List permission boundaries for an application
      operationId: listApplicationPermissionBoundaries
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,type,name,displayName,tenantVisibility
        schema:
          type: string
      - name: include_predefined_permission_boundaries
        in: query
        example: false
        schema:
          type: boolean
      - name: query
        in: query
        example: type ne "PREDEFINED"
        schema:
          type: string
      responses:
        '200':
          description: Permission boundary list returned.
  /api/v1/applications/{applicationId}/signing-keys:
    get:
      tags:
      - Applications
      - Signing Keys
      summary: List signing keys for an application
      operationId: listApplicationSigningKeys
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Signing keys returned.
  /api/v1/applications/{applicationId}/signing-keys/rotate:
    post:
      tags:
      - Applications
      - Signing Keys
      summary: Rotate signing keys for an application
      operationId: rotateApplicationSigningKeys
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Signing keys rotated.
  /api/v1/applications/{applicationId}/custom-claims:
    get:
      tags:
      - Applications
      - Custom Claims
      summary: List custom claims for an application
      operationId: listApplicationCustomClaims
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: Custom claims returned.
  /api/v1/applications/{applicationId}/refresh-token-table-data/{userId}:
    get:
      tags:
      - Applications
      - Users
      summary: Get refresh token table data for a user within an application
      operationId: getRefreshTokenTableData
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/userId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: Refresh token data returned.
  /api/v1/applications/{applicationId}/auth-session-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve auth session policy overrides for an application
      operationId: resolveAuthSessionPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: cookiePersistenceType,idleSessionTimeout,absoluteSessionTimeout
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/bot-detection-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve bot detection policy overrides for an application
      operationId: resolveBotDetectionPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: loginCaptchaEnforcementStrategy
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/mfa-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve MFA policy overrides for an application
      operationId: resolveMfaPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: enrollmentStrategy,allowedAuthFactors,totpSettings
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/password-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve password policy overrides for an application
      operationId: resolvePasswordPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: minimumLength,lowercaseCharRequired,uppercaseCharRequired,digitRequired,specialCharRequired,breachedPwdDetectionEnabled,breachedPwdLoginRemediationStrategy
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/role-assignment-policy-data:
    post:
      tags:
      - Applications
      - Policies
      summary: Get role assignment policy data for an application
      operationId: getRoleAssignmentPolicyData
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: defaultIdpUserSyncRoles,defaultSignupRoles
        schema:
          type: string
      responses:
        '200':
          description: Role assignment policy data returned.
  /api/v1/applications/{applicationId}/webhook-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve webhook policy overrides for an application
      operationId: resolveWebhookPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: webhooksEnabled
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/workflow-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve workflow policy overrides for an application
      operationId: resolveWorkflowPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: type,customRedirectEnabled,customRedirectUrl,emailVerificationStrategy,userActivationStrategy,enabledStrategies,rememberTenantsEnabled,verificationStep,immediateLoginEnabled,unverifiedEmailAction,allowChangingTenants,missingPwdRemediationStrategy,invitationLinkLifetime,customInvitationLinkUrl,customPasswordResetLinkUrl,passwordResetLinkLifetime
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/email-policies/resolve-overrides:
    post:
      tags:
      - Applications
      - Policies
      summary: Resolve email policy overrides for an application
      operationId: resolveEmailPolicyOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: id,emailType,actionLinkUrl,actionLinkLifetime,actionLinkLifetimeUnit
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/user-schemas/resolve-overrides:
    post:
      tags:
      - Applications
      summary: Resolve user schema overrides for an application
      operationId: resolveUserSchemaOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: baseProfile.required
        schema:
          type: string
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/identity-providers/wristband/resolve-overrides:
    post:
      tags:
      - Applications
      - Identity Providers
      summary: Resolve Wristband identity provider overrides for an application
      operationId: resolveWristbandIdpOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/identity-providers/social/resolve-overrides:
    post:
      tags:
      - Applications
      - Identity Providers
      summary: Resolve social identity provider overrides for an application
      operationId: resolveSocialIdpOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Resolved overrides returned.
  /api/v1/applications/{applicationId}/page-brandings/resolve-overrides:
    post:
      tags:
      - Applications
      - Brandings
      summary: Resolve page branding overrides for an application
      operationId: resolvePageBrandingOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        description: Comma-separated list of branding fields to resolve.
        example: pageBackgroundType,pageBackgroundColor,pageBackgroundImageUrl,panelBackgroundColor,panelTextColor,panelBorderRadiusPixels,panelBorderColor,panelBoxShadowEnabled,primaryButtonBackgroundColor,primaryButtonTextColor,logoUrl,logoHeightPixels,faviconUrl,websiteUrl,termsOfServiceUrl,privacyPolicyUrl,supportUrl,supportEmail
        schema:
          type: string
      - name: application_signup_page_branding_fields
        in: query
        example: '*'
        schema:
          type: string
      - name: tenant_signup_page_branding_fields
        in: query
        example: '*'
        schema:
          type: string
      - name: application_login_page_branding_fields
        in: query
        example: '*'
        schema:
          type: string
      - name: tenant_login_page_branding_fields
        in: query
        example: '*'
        schema:
          type: string
      responses:
        '200':
          description: Resolved page branding overrides returned.
  /api/v1/applications/{applicationId}/email-brandings/resolve-overrides:
    post:
      tags:
      - Applications
      - Brandings
      summary: Resolve email branding overrides for an application
      operationId: resolveEmailBrandingOverrides
      parameters:
      - $ref: '#/components/parameters/applicationId'
      - name: fields
        in: query
        example: primaryButtonBackgroundColor,primaryButtonTextColor,primaryButtonBorderRadiusPixels,primaryButtonBorderColor,logoUrl,logoAltText,logoWidthPixels,logoHeightPixels,supportEmail,websiteUrl,supportUrl,fromName,fromAddress,logoDisplayed
        schema:
          type: string
      responses:
        '200':
          description: Resolved email branding overrides returned.
  /api/v1/tenants:
    post:
      tags:
      - Tenants
      summary: Create a tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
            example:
              applicationId: 4hkv6bxrwzcbtnw7pt264auuki
              type: STANDARD
              displayName: new tenant
              name: newtenant11
      responses:
        '200':
          description: Tenant created.
  /api/v1/tenants/{tenantId}:
    patch:
      tags:
      - Tenants
      summary: Update a tenant
      operationId: updateTenant
      parameters:
      - $ref: '#/components/parameters/tenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
            example:
              displayName: purple1
              description: This is a test account.
              logoUrl: ''
      responses:
        '200':
          description: Tenant updated.
  /api/v1/tenants/{tenantId}/assignable-role-select-options:
    get:
      tags:
      - Tenants
      - Roles
      summary: Get assignable role select options for a tenant
      operationId: getTenantAssignableRoleSelectOptions
      parameters:
      - $ref: '#/components/parameters/tenantId'
      responses:
        '200':
          description: Assignable role options returned.
  /api/v1/tenants/{tenantId}/tenant-admins-table-data:
    get:
      tags:
      - Tenants
      summary: Get tenant admins table data
      operationId: getTenantAdminsTableData
      parameters:
      - $ref: '#/components/parameters/tenantId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,tenantId,applicationId,identityProviderType,givenName,familyName,email,pictureUrl,status
        schema:
          type: string
      responses:
        '200':
          description: Tenant admins table data returned.
  /api/v1/tenants/{tenantId}/admin-invitation-requests:
    get:
      tags:
      - Tenants
      summary: List admin invitation requests for a tenant
      operationId: listTenantAdminInvitationRequests
      parameters:
      - $ref: '#/components/parameters/tenantId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,email,inviteeName,invitationType,tenantId,rolesToAssign
        schema:
          type: string
      - name: query
        in: query
        example: invitationType eq "EMAIL" and status eq "PENDING_INVITE_ACCEPTANCE"
        schema:
          type: string
      responses:
        '200':
          description: Invitation requests returned.
  /api/v1/users:
    post:
      tags:
      - Users
      summary: Create a user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              tenantId: rng6sb3pd5cfplqm24j4ja67bm
              identityProviderName: wristband
              email: jack@tester.com
              sendInvitation: false
              rolesToAssign:
              - ipw2o6op65cpfbi5cowydv2asi
      responses:
        '200':
          description: User created.
  /api/v1/users/{userId}:
    patch:
      tags:
      - Users
      summary: Update a user
      operationId: updateUser
      parameters:
      - $ref: '#/components/parameters/userId'
      - name: replace_custom_metadata
        in: query
        description: If false, merges custom metadata instead of replacing it.
        example: false
        schema:
          type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              givenName: ''
              middleName: ''
              familyName: ''
              honorificPrefix: null
              honorificSuffix: II
              nickname: ''
              fullName: ''
              displayName: ''
              gender: ''
              username: ''
              externalId: ''
              timeZone: America/Los_Angeles
              locale: en-US
              preferredLanguage: en-US
              phoneNumber: ''
              birthdate: null
              pictureUrl: ''
      responses:
        '200':
          description: User updated.
  /api/v1/users/{userId}/auth-sessions:
    get:
      tags:
      - Users
      summary: List auth sessions for a user
      operationId: listUserAuthSessions
      parameters:
      - $ref: '#/components/parameters/userId'
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: Auth sessions returned.
  /api/v1/users-table-data:
    get:
      tags:
      - Users
      summary: Get users table data
      operationId: getUsersTableData
      parameters:
      - name: entity_type
        in: query
        description: The entity scope (e.g. APPLICATION).
        example: APPLICATION
        required: true
        schema:
          type: string
          enum:
          - APPLICATION
          - TENANT
      - name: entity_id
        in: query
        description: ID of the scoping entity.
        example: 4hkv6bxrwzcbtnw7pt264auuki
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: fields
        in: query
        example: id,applicationId,tenantId,identityProviderType,email,status,givenName,familyName,pictureUrl
        schema:
          type: string
      responses:
        '200':
          description: Users table data returned.
  /api/v1/new-user-invites-table-data:
    get:
      tags:
      - Users
      summary: Get new user invitations table data
      operationId: getNewUserInvitesTableData
      parameters:
      - name: entity_type
        in: query
        example: APPLICATION
        required: true
        schema:
          type: string
          enum:
          - APPLICATION
          - TENANT
      - name: entity_id
        in: query
        example: 4hkv6bxrwzcbtnw7pt264auuki
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/startIndex'
      - $ref: '#/components/parameters/count'
      - name: query
        in: query
        example: invitationType eq "EMAIL" and status eq "PENDING_INVITE_ACCEPTANCE"
        schema:
          type: string
      responses:
        '200':
          description: User invitations table data returned.
