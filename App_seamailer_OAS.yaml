      operationId: get_v1_0_contacts_statistics
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
          example: 2026-02-28T18:30:00Z
        - name: endDate
          in: query
          required: false
          schema:
            type: string
          example: 2026-03-05T18:30:00Z
      responses:
        "200":
          description: Success
  /v1.0/campaigns/metrics/sum:
    get:
