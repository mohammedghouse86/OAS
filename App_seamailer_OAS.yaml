  /v1.0/segments/query:
    post:
      tags:
        - segments
      summary: POST /v1.0/segments/query
      operationId: post_v1_0_segments_query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentsPostRequest"
            examples:
              fromHar:
                value:
                  query:
                    or:
                      - and:
                          - key: email_sent
                            match: is_on
                            value: []
                            frequencyOperator: eq
                            frequencyOperatorValue: "1"
                            optionSelected: any_email
                            index: 0
                            groupIndex: 0
                            timeframeUnit: Days
                            displayLabel: Email sent
      responses:
        "200":
          description: Success
  /v1.0/segments/create:
