  /v1.0/contacts:
    get:
      tags:
        - contacts
      summary: GET /v1.0/contacts
      operationId: get_v1_0_contacts
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: string
          example: "1"
        - name: pageSize
          in: query
          required: false
          schema:
            type: string
          example: "100"
        - name: search
          in: query
          required: false
          schema:
            type: string
          example: ""
      responses:
        "200":
          description: Success
    post:
