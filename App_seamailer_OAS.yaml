          application/json:
            schema:
              $ref: "#/components/schemas/SegmentsPostRequest"
            examples:
              fromHar:
                value:
                  name: ss
                  filter:
                    query:
                      or:
                        - and:
                            - key: email_sent
                              match: is_on
                              value:
                                - 2026-03-11
                              frequencyOperator: gte
                              frequencyOperatorValue: "1"
                              optionSelected: marketing_email
                              index: 0
                              groupIndex: 0
                              timeframeUnit: Days
                              displayLabel: Email sent
      responses:
        "200":
          description: Success
