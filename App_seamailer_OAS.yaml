  /v1.0/templates/{id}:
    patch:
      tags:
        - templates
      summary: PATCH /v1.0/templates/{id}
      operationId: patch_v1_0_templates_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "929381"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplatesPatchRequest"
            examples:
              fromHar:
                value:
                  templateId: 929381
                  templateName: ss
                  templateJson:
                    mainVersion: 1
                    version: 0.0.2
                    components:
                      - id: a2e7489d-b75d-409c-8c8c-6b99dd766187
                        type: logo
                        label: Logo
                        isContainer: false
                        properties:
                          src: null
                          alt: Logo
                          caption: ""
                          link: ""
                          width: 100px
                          height: auto
                          backgroundColor: transparent
                          objectFit: contain
                          objectPosition: center
                          alignment: center
                          borderRadius: 0px
                          borderWidth: "0"
                          borderStyle: solid
                          borderColor: "#000000"
                          boxShadow: none
                          opacity: "1"
                          filter: none
                          transition: all 0.3s ease
                          hoverOpacity: "0.8"
                          hoverFilter: brightness(1.1)
                          hoverTransform: scale(1.03)
                        editorProperties:
                          - name: content
                            properties:
                              - name: src
                                type: image
                                value: null
                                label: Image
                                metadata: null
                              - name: alt
                                type: text
                                value: Logo
                                label: Alt Text
                              - name: caption
                                type: text
                                value: ""
                                label: Caption
                              - name: link
                                type: link
                                value: ""
                                label: Link To
                          - name: size
                            properties:
                              - name: width
                                type: size
                                value: 100px
                                label: Width
                              - name: height
                                type: size
                                value: auto
                                label: Height
                          - name: style
                            properties:
                              - name: backgroundColor
                                type: color
                                value: transparent
                                label: Background
                              - name: objectFit
                                type: select
                                value: contain
                                label: Object Fit
                                options:
                                  - cover
                                  - contain
                                  - fill
                                  - none
                                  - scale-down
                              - name: objectPosition
                                type: select
                                value: center
                                label: Object Position
                                options:
                                  - center
                                  - top
                                  - bottom
                                  - left
                                  - right
                              - name: alignment
                                type: select
                                value: center
                                label: Alignment
                                options:
                                  - left
                                  - center
                                  - right
                              - name: borderRadius
                                type: size
                                value: 0px
                                label: Border Radius
                              - name: borderWidth
                                type: size
                                value: "0"
                                label: Border Width
                              - name: borderStyle
                                type: select
                                value: solid
                                label: Border Style
                                options:
                                  - none
                                  - solid
                                  - dashed
                                  - dotted
                              - name: borderColor
                                type: color
                                value: "#000000"
                                label: Border Color
                              - name: boxShadow
                                type: text
                                value: none
                                label: Box Shadow
                              - name: opacity
                                type: text
                                value: "1"
                                label: Opacity
                              - name: filter
                                type: text
                                value: none
                                label: Filter
                          - name: animation
                            properties:
                              - name: transition
                                type: text
                                value: all 0.3s ease
                                label: Transition
                              - name: hoverOpacity
                                type: text
                                value: "0.8"
                                label: Hover Opacity
                              - name: hoverFilter
                                type: text
                                value: brightness(1.1)
                                label: Hover Filter
                              - name: hoverTransform
                                type: text
                                value: scale(1.03)
                                label: Hover Transform
                    globalSettings:
                      id: global-settings
                      type: global
                      label: Global Settings
                      isContainer: false
                      properties:
                        backgroundColor: "#f4f4f4"
                        contentBackgroundColor: "#ffffff"
                        fontFamily: Inter, sans-serif
                        maxWidth: 600px
                        padding: 0px
                      editorProperties:
                        - name: General Styles
                          properties:
                            - name: backgroundColor
                              label: Body Background
                              type: color
                              value: "#f4f4f4"
                            - name: contentBackgroundColor
                              label: Content Background
                              type: color
                              value: "#ffffff"
                            - name: fontFamily
                              label: Font Family
                              type: select
                              value: Inter, sans-serif
                              options:
                                - label: Inter
                                  value: Inter, sans-serif
                                - label: Archivo
                                  value: Archivo, sans-serif
                                - label: Roboto
                                  value: Roboto, sans-serif
                                - label: Arial
                                  value: Arial, Helvetica, sans-serif
                                - label: Arial Black
                                  value: '"Arial Black", Gadget, sans-serif'
                                - label: Verdana
                                  value: Verdana, Geneva, sans-serif
                                - label: Tahoma
                                  value: Tahoma, Geneva, sans-serif
                                - label: Trebuchet MS
                                  value: '"Trebuchet MS", Helvetica, sans-serif'
                                - label: Impact
                                  value: Impact, Charcoal, sans-serif
                                - label: Times New Roman
                                  value: '"Times New Roman", Times, serif'
                                - label: Georgia
                                  value: Georgia, serif
                                - label: Palatino
                                  value: '"Palatino Linotype", "Book Antiqua", Palatino, serif'
                                - label: Courier New
                                  value: '"Courier New", Courier, monospace'
                                - label: Lucida Console
                                  value: '"Lucida Console", Monaco, monospace'
                            - name: maxWidth
                              label: Content Width (px)
                              type: size
                              value: 600px
                              options:
                                - px
                                - "%"
                            - name: padding
                              label: Padding
                              type: padding
                              value: 0px
                  templateHtml: >-
                    <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
                    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

                    <html xmlns="http://www.w3.org/1999/xhtml">

                    <head>
                        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
                        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                        <title>Email Template</title>
                        <style type="text/css">
                            body { margin: 0; padding: 0; min-width: 100%; width: 100% !important; height: 100% !important; font-family: Inter, sans-serif; }
                            body, table, td, div, p, a { -webkit-font-smoothing: antialiased; text-size-adjust: 100%; -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; line-height: 100%; }
                            table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse !important; border-spacing: 0; }
                            img { border: 0; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
                            p { margin: 0; }
                            h1, h2, h3, h4, h5, h6 { margin: 0; }
                            #outlook a { padding: 0; }
                            .ReadMsgBody { width: 100%; } .ExternalClass { width: 100%; }
                            .ExternalClass, .ExternalClass p, .ExternalClass span, .ExternalClass font, .ExternalClass td, .ExternalClass div { line-height: 100%; }

                            
                            @media screen and (max-width: 600px) {
                                .email-container { width: 100% !important; }
                                img { max-width: 100% !important; height: auto !important; }
                                
                                .stack-on-mobile {
                                    display: block !important;
                                    width: 100% !important;
                                }
                                .stack-on-mobile > tbody > tr > td, .stack-on-mobile > tr > td, .stack-column {
                                    display: block !important;
                                    width: 100% !important;
                                    box-sizing: border-box !important;
                                    padding-left: 0 !important;
                                    padding-right: 0 !important;
                                    padding-bottom: 16px !important;
                                }
                                .stack-column:last-child {
                                    padding-bottom: 0 !important;
                                }
                            }
                        </style>
                    </head>

                    <body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Inter, sans-serif;">
                        <center style="width: 100%; table-layout: fixed; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
                            <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff;">
                                <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" class="email-container" style="margin: 0 auto; max-width: 600px;">
                                    <tr>
                                        <td align="left" style="padding: 0px;">
                                            
                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                                <td align="center" style="padding: 0;">
                                     <img src="" alt="Logo" width="100" style="display: block; border: 0; width: 100px; max-width: 100%; height: auto; object-fit: contain" />
                                </td>
                            </tr>
                        </table>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                        </center>
                    </body>

                    </html>
                  editorVersion: brick_v1
      responses:
        "200":
          description: Success
  /v1.0/notifications:
