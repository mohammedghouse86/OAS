      operationId: patch_v1_0_accounts_user_tick_tock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountsPatchRequest"
            examples:
              fromHar:
                value:
                  userAgent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0
                    Safari/537.36
                  device: null
                  browser: Chrome/145.0.0.0
                  timezone: Asia/Calcutta
      responses:
        "200":
          description: Success
  /v1.0/users/request-otp:
