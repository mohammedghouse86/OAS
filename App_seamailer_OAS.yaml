openapi: 3.0.3
info:
  title: Seamailer App
  version: 1.0.0
servers:
  - url: https://api.seamailer.app
tags:
  - name: accounts
  - name: analytics
  - name: campaigns
  - name: campaigns-ab
  - name: contacts
  - name: data-verifier
  - name: groups
  - name: notifications
  - name: segments
  - name: submit
  - name: templates
  - name: users
paths:
  /v1.0/{id}/submit:
    post:
      tags:
        - submit
      summary: POST /v1.0/{id}/submit
      operationId: post_v1_0_id_submit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: user-verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPostRequest"
            examples:
              fromHar:
                value:
                  companyName: Executive G Org
                  address: 6-3-349/9
                  city: Hyderabad
                  country: India
                  website: ""
                  aboutBusiness: hi this is my business
                  sendVolume: 1-10k
                  noteOnSubscribers: "entertainment content "
                  hasWebsite: no
                  hasSubscribers: no
      responses:
        "200":
          description: Success
  /v1.0/accounts/user-details:
